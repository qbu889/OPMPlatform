{% extends "base.html" %}

{% block title %}排班管理系统{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0"><i class="fas fa-calendar-alt me-2"></i>排班管理系统</h3>
        </div>
        <div class="card-body">
            <div class="controls mb-4">
                <input type="month" id="monthPicker" class="form-control d-inline-block w-auto" value="2026-02">
                <button id="prevMonth" class="btn btn-outline-secondary ms-2">上个月</button>
                <button id="nextMonth" class="btn btn-outline-secondary ms-2">下个月</button>
                <button id="refreshData" class="btn btn-primary ms-2">刷新数据</button>
            </div>

            <div class="calendar-container">
                <table class="calendar-table table table-bordered">
                    <thead>
                        <tr class="weekdays">
                            <th>日期</th>
                            <th>星期</th>
                            <th>8:00～9:00</th>
                            <th>9:00～12:00</th>
                            <th>13:30～18:00</th>
                            <th>18:00～21:00</th>
                            <th>8:00～12:00</th>
                            <th>13:30～17:30</th>
                            <th>17:30～21:30</th>
                        </tr>
                    </thead>
                    <tbody id="calendarBody">
                        <!-- 动态生成日历内容 -->
                    </tbody>
                </table>
            </div>

            <div class="legend mt-3 p-3 bg-light rounded">
                <div class="legend-item d-inline-flex align-items-center me-4">
                    <span class="legend-color core-staff rounded me-2"></span>
                    <span>核心人员</span>
                </div>
                <div class="legend-item d-inline-flex align-items-center">
                    <span class="legend-color regular-staff rounded me-2"></span>
                    <span>普通人员</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .calendar-container {
        margin-top: 20px;
        overflow-x: auto;
    }
    
    .calendar-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }
    
    .calendar-table th,
    .calendar-table td {
        border: 1px solid #dee2e6 !important;
        padding: 12px 8px;
        text-align: center;
        min-width: 100px;
    }
    
    .calendar-table th {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-weight: 600;
    }
    
    .weekdays th {
        background: linear-gradient(135deg, #4361ee 0%, #3a56d6 100%) !important;
    }
    
    .legend {
        display: flex;
        gap: 20px;
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
    }
    
    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .legend-color {
        width: 20px;
        height: 20px;
    }
    
    .core-staff {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .regular-staff {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
</style>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='schedule.js') }}"></script>
{% endblock %}
