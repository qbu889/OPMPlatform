{% extends "base.html" %}

{% block title %}找回密码 - OPM系统{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 mt-5">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-key" style="font-size: 3rem; color: var(--primary-color);"></i>
                        <h2 class="mt-3">找回密码</h2>
                        <p class="text-muted">通过安全问题重置您的密码</p>
                    </div>
                    
                    <!-- 步骤指示器 -->
                    <div class="mb-4">
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar" id="stepProgress" role="progressbar" style="width: 33%"></div>
                        </div>
                        <div class="d-flex justify-content-between mt-2">
                            <small class="text-muted" id="step1-indicator">1. 验证身份</small>
                            <small class="text-muted" id="step2-indicator">2. 回答问题</small>
                            <small class="text-muted" id="step3-indicator">3. 重置密码</small>
                        </div>
                    </div>
                    
                    <!-- 步骤1: 输入用户名 -->
                    <div id="step1" class="step-content">
                        <h5 class="mb-3">请输入您的用户名</h5>
                        <form id="usernameForm">
                            <div class="mb-3">
                                <label for="resetUsername" class="form-label">用户名</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <input type="text" class="form-control" id="resetUsername" name="username" required>
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id="nextStep1">
                                    <i class="fas fa-arrow-right me-2"></i>下一步
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <!-- 步骤2: 回答安全问题 -->
                    <div id="step2" class="step-content d-none">
                        <h5 class="mb-3">安全问题验证</h5>
                        <div class="alert alert-info mb-3">
                            <i class="fas fa-info-circle me-2"></i>
                            <span id="securityQuestionText">安全问题将在这里显示</span>
                        </div>
                        <form id="answerForm">
                            <div class="mb-3">
                                <label for="securityAnswer" class="form-label">您的答案</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-shield-alt"></i>
                                    </span>
                                    <input type="text" class="form-control" id="securityAnswer" name="answer" required>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary" id="prevStep2">
                                    <i class="fas fa-arrow-left me-2"></i>上一步
                                </button>
                                <button type="submit" class="btn btn-primary" id="nextStep2">
                                    <i class="fas fa-arrow-right me-2"></i>验证答案
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <!-- 步骤3: 重置密码 -->
                    <div id="step3" class="step-content d-none">
                        <h5 class="mb-3">设置新密码</h5>
                        <form id="resetPasswordForm">
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">新密码</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-key"></i>
                                    </span>
                                    <input type="password" class="form-control" id="newPassword" name="new_password" required 
                                           minlength="8" placeholder="至少8位，包含字母和数字">
                                    <button class="btn btn-outline-secondary" type="button" id="toggleNewPassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text">密码需包含字母和数字，至少8位</div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="confirmNewPassword" class="form-label">确认新密码</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-key"></i>
                                    </span>
                                    <input type="password" class="form-control" id="confirmNewPassword" name="confirm_password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="toggleConfirmNewPassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-secondary" id="prevStep3">
                                    <i class="fas fa-arrow-left me-2"></i>上一步
                                </button>
                                <button type="submit" class="btn btn-success" id="resetPasswordBtn">
                                    <i class="fas fa-sync-alt me-2"></i>重置密码
                                </button>
                            </div>
                        </form>
                    </div>
                    
                    <!-- 完成状态 -->
                    <div id="completeStep" class="step-content d-none text-center">
                        <div class="mb-4">
                            <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                        </div>
                        <h4 class="text-success">密码重置成功！</h4>
                        <p class="text-muted">您的密码已成功重置，现在可以使用新密码登录。</p>
                        <div class="d-grid mt-4">
                            <a href="/login" class="btn btn-primary">
                                <i class="fas fa-sign-in-alt me-2"></i>立即登录
                            </a>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="{{ url_for('auth.login_page') }}" class="text-decoration-none">
                            <i class="fas fa-arrow-left me-1"></i>返回登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 当前步骤
    let currentStep = 1;
    let currentUser = '';
    
    // DOM元素
    const stepProgress = document.getElementById('stepProgress');
    const stepIndicators = {
        1: document.getElementById('step1-indicator'),
        2: document.getElementById('step2-indicator'),
        3: document.getElementById('step3-indicator')
    };
    
    const steps = {
        1: document.getElementById('step1'),
        2: document.getElementById('step2'),
        3: document.getElementById('step3'),
        4: document.getElementById('completeStep')
    };
    
    // 表单元素
    const usernameForm = document.getElementById('usernameForm');
    const answerForm = document.getElementById('answerForm');
    const resetPasswordForm = document.getElementById('resetPasswordForm');
    
    // 按钮元素
    const nextStep1 = document.getElementById('nextStep1');
    const prevStep2 = document.getElementById('prevStep2');
    const nextStep2 = document.getElementById('nextStep2');
    const prevStep3 = document.getElementById('prevStep3');
    const resetPasswordBtn = document.getElementById('resetPasswordBtn');
    
    // 密码显示切换
    document.getElementById('toggleNewPassword').addEventListener('click', function() {
        togglePasswordVisibility('newPassword', this);
    });
    
    document.getElementById('toggleConfirmNewPassword').addEventListener('click', function() {
        togglePasswordVisibility('confirmNewPassword', this);
    });
    
    function togglePasswordVisibility(inputId, button) {
        const input = document.getElementById(inputId);
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        button.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    }
    
    // 实时密码确认验证
    const newPasswordInput = document.getElementById('newPassword');
    const confirmNewPasswordInput = document.getElementById('confirmNewPassword');
    
    confirmNewPasswordInput.addEventListener('input', function() {
        if (this.value && newPasswordInput.value !== this.value) {
            this.setCustomValidity('两次输入的密码不一致');
        } else {
            this.setCustomValidity('');
        }
    });
    
    // 步骤导航函数
    function goToStep(step) {
        // 隐藏所有步骤
        Object.values(steps).forEach(s => s.classList.add('d-none'));
        
        // 显示当前步骤
        steps[step].classList.remove('d-none');
        
        // 更新进度条
        stepProgress.style.width = `${(step - 1) * 33.33}%`;
        
        // 更新指示器
        Object.keys(stepIndicators).forEach(key => {
            if (parseInt(key) <= step) {
                stepIndicators[key].classList.remove('text-muted');
                stepIndicators[key].classList.add('text-primary', 'fw-bold');
            } else {
                stepIndicators[key].classList.add('text-muted');
                stepIndicators[key].classList.remove('text-primary', 'fw-bold');
            }
        });
        
        currentStep = step;
    }
    
    // 步骤1：验证用户名
    usernameForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('resetUsername').value.trim();
        currentUser = username;
        
        nextStep1.disabled = true;
        nextStep1.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>验证中...';
        
        try {
            // 获取安全问题
            const response = await fetch('/api/get-security-question', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({username: username})
            });
            
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('securityQuestionText').textContent = result.question;
                goToStep(2);
            } else {
                showNotification(result.message || '获取安全问题失败', 'error');
            }
        } catch (error) {
            console.error('获取安全问题错误:', error);
            showNotification('网络错误，请稍后重试', 'error');
        } finally {
            nextStep1.disabled = false;
            nextStep1.innerHTML = '<i class="fas fa-arrow-right me-2"></i>下一步';
        }
    });
    
    // 步骤2：验证安全问题答案
    answerForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const answer = document.getElementById('securityAnswer').value.trim();
        
        nextStep2.disabled = true;
        nextStep2.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>验证中...';
        
        try {
            const response = await fetch('/api/verify-security-answer', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: currentUser,
                    answer: answer
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                goToStep(3);
            } else {
                showNotification(result.message || '答案验证失败', 'error');
            }
        } catch (error) {
            console.error('验证答案错误:', error);
            showNotification('网络错误，请稍后重试', 'error');
        } finally {
            nextStep2.disabled = false;
            nextStep2.innerHTML = '<i class="fas fa-arrow-right me-2"></i>验证答案';
        }
    });
    
    // 步骤3：重置密码
    resetPasswordForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmNewPassword').value;
        
        if (newPassword !== confirmPassword) {
            showNotification('两次输入的密码不一致', 'error');
            return;
        }
        
        resetPasswordBtn.disabled = true;
        resetPasswordBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>重置中...';
        
        try {
            const response = await fetch('/api/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: currentUser,
                    new_password: newPassword,
                    confirm_password: confirmPassword
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                goToStep(4); // 完成步骤
            } else {
                showNotification(result.message || '密码重置失败', 'error');
            }
        } catch (error) {
            console.error('重置密码错误:', error);
            showNotification('网络错误，请稍后重试', 'error');
        } finally {
            resetPasswordBtn.disabled = false;
            resetPasswordBtn.innerHTML = '<i class="fas fa-sync-alt me-2"></i>重置密码';
        }
    });
    
    // 上一步按钮事件
    prevStep2.addEventListener('click', () => goToStep(1));
    prevStep3.addEventListener('click', () => goToStep(2));
    
    // 显示通知函数
    function showNotification(message, type = 'info') {
        // 移除现有的通知
        const existingToast = document.querySelector('.toast');
        if (existingToast) {
            existingToast.remove();
        }
        
        // 创建通知元素
        const toastHTML = `
            <div class="toast align-items-center text-white bg-${type === 'success' ? 'success' : type === 'error' ? 'danger' : 'primary'} border-0 position-fixed top-0 end-0 m-3" 
                 role="alert" aria-live="assertive" aria-atomic="true" style="z-index: 1050;">
                <div class="d-flex">
                    <div class="toast-body">
                        ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', toastHTML);
        
        // 显示通知
        const toastEl = document.querySelector('.toast:last-child');
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
        
        // 自动移除
        toastEl.addEventListener('hidden.bs.toast', function() {
            this.remove();
        });
    }
});
</script>
{% endblock %}
