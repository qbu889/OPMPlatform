<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业领域管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
        }
        .category-item {
            border-left: 4px solid #1890ff;
            transition: all 0.3s ease;
        }
        .category-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            display: inline-block;
            border: 2px solid #ddd;
        }
        .badge-active {
            background-color: #52c41a;
        }
        .badge-inactive {
            background-color: #d9d9d9;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white rounded shadow-sm mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/chatbot">
                <i class="fas fa-arrow-left me-2"></i>返回智能客服
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/chatbot"><i class="fas fa-comments me-1"></i>聊天界面</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/api/category/page"><i class="fas fa-tags me-1"></i>领域管理</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 添加领域卡片 -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-plus-circle me-2"></i>添加专业领域
            </div>
            <div class="card-body">
                <form id="addCategoryForm">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="categoryName" class="form-label">领域名称 *</label>
                                <input type="text" class="form-control" id="categoryName" required placeholder="如：传输网、核心网">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="categoryDescription" class="form-label">描述</label>
                                <input type="text" class="form-control" id="categoryDescription" placeholder="领域描述">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="mb-3">
                                <label for="categoryColor" class="form-label">颜色</label>
                                <input type="color" class="form-control form-control-color" id="categoryColor" value="#1890ff">
                            </div>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-plus me-1"></i>添加
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- 领域列表卡片 -->
        <div class="card">
            <div class="card-header">
                <i class="fas fa-list me-2"></i>专业领域列表
            </div>
            <div class="card-body">
                <div id="categoryList" class="row">
                    <!-- 领域列表将通过 JS 动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑专业领域</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editCategoryId">
                    <div class="mb-3">
                        <label for="editName" class="form-label">领域名称</label>
                        <input type="text" class="form-control" id="editName">
                    </div>
                    <div class="mb-3">
                        <label for="editDescription" class="form-label">描述</label>
                        <input type="text" class="form-control" id="editDescription">
                    </div>
                    <div class="mb-3">
                        <label for="editColor" class="form-label">颜色</label>
                        <input type="color" class="form-control form-control-color" id="editColor">
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="editActive">
                            <label class="form-check-label" for="editActive">
                                启用状态
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 加载领域列表
        function loadCategories() {
            fetch('/api/category/list')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderCategories(data.categories);
                    }
                })
                .catch(error => {
                    console.error('加载失败:', error);
                    Swal.fire('错误', '加载领域列表失败', 'error');
                });
        }

        // 渲染领域列表
        function renderCategories(categories) {
            const container = document.getElementById('categoryList');
            container.innerHTML = '';

            if (categories.length === 0) {
                container.innerHTML = '<div class="col-12 text-center text-muted">暂无专业领域</div>';
                return;
            }

            categories.forEach(cat => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4 mb-3';
                col.innerHTML = `
                    <div class="card category-item" style="border-left-color: ${cat.color}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <h6 class="card-title mb-0 fw-bold">${cat.name}</h6>
                                <span class="badge ${cat.is_active ? 'badge-active' : 'badge-inactive'}">
                                    ${cat.is_active ? '启用' : '停用'}
                                </span>
                            </div>
                            <p class="card-text text-muted small mb-2">${cat.description || '无描述'}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="d-flex align-items-center">
                                    <div class="color-preview me-2" style="background-color: ${cat.color}"></div>
                                    <small class="text-muted">颜色</small>
                                </div>
                                <div>
                                    <button class="btn btn-sm btn-outline-primary me-1" onclick="editCategory(${cat.id}, '${cat.name}', '${cat.description}', '${cat.color}', ${cat.is_active})">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteCategory(${cat.id}, '${cat.name}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
        }

        // 添加领域
        document.getElementById('addCategoryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('categoryName').value;
            const description = document.getElementById('categoryDescription').value;
            const color = document.getElementById('categoryColor').value;

            fetch('/api/category/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, description, color })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire('成功', '添加成功', 'success');
                    document.getElementById('addCategoryForm').reset();
                    loadCategories();
                } else {
                    Swal.fire('错误', data.error, 'error');
                }
            })
            .catch(error => {
                Swal.fire('错误', '添加失败：' + error, 'error');
            });
        });

        // 编辑领域
        function editCategory(id, name, description, color, isActive) {
            document.getElementById('editCategoryId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editDescription').value = description || '';
            document.getElementById('editColor').value = color;
            document.getElementById('editActive').checked = isActive;
            
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
        }

        // 保存编辑
        function saveEdit() {
            const id = document.getElementById('editCategoryId').value;
            const name = document.getElementById('editName').value;
            const description = document.getElementById('editDescription').value;
            const color = document.getElementById('editColor').value;
            const isActive = document.getElementById('editActive').checked;

            fetch('/api/category/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    id, 
                    name, 
                    description, 
                    color,
                    is_active: isActive 
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire('成功', '更新成功', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    loadCategories();
                } else {
                    Swal.fire('错误', data.error, 'error');
                }
            })
            .catch(error => {
                Swal.fire('错误', '更新失败：' + error, 'error');
            });
        }

        // 删除领域
        function deleteCategory(id, name) {
            Swal.fire({
                title: '确认删除',
                text: `确定要删除领域 "${name}" 吗？`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: '删除',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch('/api/category/delete', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ id })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            Swal.fire('已删除', '领域已成功删除', 'success');
                            loadCategories();
                        } else {
                            Swal.fire('错误', data.error, 'error');
                        }
                    })
                    .catch(error => {
                        Swal.fire('错误', '删除失败：' + error, 'error');
                    });
                }
            });
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', loadCategories);
    </script>
</body>
</html>
