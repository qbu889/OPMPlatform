{% extends "base.html" %}

{% block title %}SQL ID格式化工具{% endblock %}

{% block content %}
<div class="sql-formatter-container">
    <div class="sql-card">
        <div class="sql-header">
            <h1 class="sql-title">
                <i class="fas fa-database me-3"></i>
                SQL ID 格式化工具
            </h1>
            <p class="sql-subtitle">快速格式化 ID 列表用于 SQL 查询</p>
        </div>
        
        <div class="sql-body">
            <div class="form-group">
                <label for="ids" class="form-label">
                    <i class="fas fa-list me-2"></i>请输入 ID（每行一个）:
                </label>
                <textarea 
                    id="ids" 
                    class="form-control" 
                    placeholder="例如：
FJ-076-20251202-0322
FJ-076-20251202-0323"
                ></textarea>
            </div>
            
            <button class="btn-format" onclick="formatIds()">
                <i class="fas fa-magic me-2"></i>格式化 ID
            </button>
            
            <div id="resultContainer" class="result-container" style="display: none;">
                <div class="result-header">
                    <h5 class="result-title">
                        <i class="fas fa-check-circle me-2"></i>
                        格式化结果:
                    </h5>
                    <button class="btn-copy" onclick="copyResult()">
                        <i class="fas fa-copy me-1"></i>复制结果
                    </button>
                    <span class="success-message" id="copySuccess">
                        <i class="fas fa-check me-1"></i>已复制到剪贴板
                    </span>
                </div>
                <div id="result" class="result-content"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
            const idsText = document.getElementById('ids').value;
            const resultContainer = document.getElementById('resultContainer');
            const resultDiv = document.getElementById('result');
    
            // 按行分割并清理空白字符
            const idsList = idsText.split('\n').filter(id => id.trim());
    
            if (idsList.length === 0) {
                alert('请输入至少一个 ID');
                return;
            }
    
            // 格式化为 SQL 格式
            const formattedIds = idsList.map(id => `'${id.trim()}'`);
    
            let result;
            if (idsList.length === 1) {
                result = formattedIds[0];
            } else {
                result = formattedIds.join(',\n');
            }
    
            resultDiv.textContent = result;
            resultContainer.style.display = 'block';
                
            // 滚动到结果区域
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function copyResult() {
            const resultText = document.getElementById('result').textContent;
            const copySuccess = document.getElementById('copySuccess');
                
            console.log('[DEBUG] 开始复制，内容长度:', resultText.length);
                
            if (navigator.clipboard && window.isSecureContext) {
                console.log('[DEBUG] 使用现代 Clipboard API');
                navigator.clipboard.writeText(resultText)
                    .then(() => {
                        console.log('[DEBUG] 复制成功');
                        showCopySuccess(copySuccess);
                    })
                    .catch(err => {
                        console.error('[ERROR] 复制失败:', err);
                        fallbackCopyText(resultText, copySuccess);
                    });
            } else {
                console.log('[DEBUG] 使用降级复制方法');
                fallbackCopyText(resultText, copySuccess);
            }
        }

        function fallbackCopyText(text, successElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            textArea.style.width = "1px";
            textArea.style.height = "1px";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
    
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    console.log('[DEBUG] 降级复制成功');
                    showCopySuccess(successElement);
                } else {
                    console.error('[ERROR] 降级复制方法也失败了');
                }
            } catch (err) {
                console.error('[ERROR] 降级复制方法出错:', err);
            }
    
            document.body.removeChild(textArea);
        }

        function showCopySuccess(element) {
            console.log('[DEBUG] 显示成功提示');
            element.style.display = 'inline';
            element.style.opacity = '1';
            setTimeout(() => {
                element.style.opacity = '0';
                setTimeout(() => {
                    element.style.display = 'none';
                }, 300);
            }, 2000);
        }
    
        // 页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease';
                
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
{% endblock %}
