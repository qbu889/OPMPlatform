{% extends "base.html" %}

{% block title %}SQL ID格式化工具{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">SQL ID格式化工具</h3>
        </div>
        <div class="card-body">

    <div class="sql-container animate-fade-in-up">
        <div class="card">
            <div class="card-header text-center">
                <h1 class="mb-0">
                    <i class="fas fa-database me-3"></i>
                    SQL ID格式化工具
                </h1>
                <p class="mb-0 mt-2 opacity-75">快速格式化ID列表用于SQL查询</p>
            </div>
            
            <div class="card-body">
                <div class="mb-4">
                    <label for="ids" class="form-label fw-bold mb-2">
                        <i class="fas fa-list me-2"></i>请输入ID（每行一个）:
                    </label>
                    <textarea 
                        id="ids" 
                        class="form-control" 
                        placeholder="例如：
FJ-076-20251202-0322
FJ-076-20251202-0323"
                    ></textarea>
                </div>
                
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" onclick="formatIds()">
                        <i class="fas fa-magic me-2"></i>格式化ID
                    </button>
                </div>
                
                <div id="resultContainer" class="mt-4" style="display: none;">
                    <div class="result-header">
                        <h5 class="mb-0">
                            <i class="fas fa-check-circle text-success me-2"></i>
                            格式化结果:
                        </h5>
                        <button class="btn btn-primary copy-btn" onclick="copyResult()">
                            <i class="fas fa-copy me-1"></i>复制结果
                        </button>
                        <span class="success-message" id="copySuccess" style="display: none;">
                            <i class="fas fa-check me-1"></i>已复制到剪贴板
                        </span>
                    </div>
                    <div id="result" class="bg-light p-3 rounded"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        function formatIds() {
            const idsText = document.getElementById('ids').value;
            const resultContainer = document.getElementById('resultContainer');
            const resultDiv = document.getElementById('result');
    
            // 按行分割并清理空白字符
            const idsList = idsText.split('\n').filter(id => id.trim());
    
            if (idsList.length === 0) {
                alert('请输入至少一个 ID');
                return;
            }
    
            // 格式化为 SQL 格式
            const formattedIds = idsList.map(id => `'${id.trim()}'`);
    
            let result;
            if (idsList.length === 1) {
                result = formattedIds[0];
            } else {
                result = formattedIds.join(',\n');
            }
    
            resultDiv.textContent = result;
            resultContainer.style.display = 'block';
                
            // 滚动到结果区域
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    
        function copyResult() {
            const resultText = document.getElementById('result').textContent;
            const copySuccess = document.getElementById('copySuccess');
                
            console.log('[DEBUG] 开始复制，内容长度:', resultText.length);
                
            if (navigator.clipboard && window.isSecureContext) {
                console.log('[DEBUG] 使用现代 Clipboard API');
                navigator.clipboard.writeText(resultText)
                    .then(() => {
                        console.log('[DEBUG] 复制成功');
                        showCopySuccess(copySuccess);
                    })
                    .catch(err => {
                        console.error('[ERROR] 复制失败:', err);
                        fallbackCopyText(resultText, copySuccess);
                    });
            } else {
                console.log('[DEBUG] 使用降级复制方法');
                fallbackCopyText(resultText, copySuccess);
            }
        }
    
        function fallbackCopyText(text, successElement) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            textArea.style.width = "1px";
            textArea.style.height = "1px";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
    
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    console.log('[DEBUG] 降级复制成功');
                    showCopySuccess(successElement);
                } else {
                    console.error('[ERROR] 降级复制方法也失败了');
                }
            } catch (err) {
                console.error('[ERROR] 降级复制方法出错:', err);
            }
    
            document.body.removeChild(textArea);
        }
    
        function showCopySuccess(element) {
            console.log('[DEBUG] 显示成功提示');
            element.style.display = 'inline';
            element.style.opacity = '1';
            setTimeout(() => {
                element.style.opacity = '0';
                setTimeout(() => {
                    element.style.display = 'none';
                }, 300);
            }, 2000);
        }
    
        // 页面加载动画
        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease';
                
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>

        </div>
    </div>
</div>
{% endblock %}

<style>

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #cffafe 100%);
            min-height: 100vh;
        }
        
        .sql-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .card {
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        
        .card-header {
            background: linear-gradient(135deg, #4361ee, #3f37c9);
            color: white;
            border-radius: 16px 16px 0 0 !important;
            border: none;
            padding: 1.5rem;
        }
        
        .card-header h1,
        .card-header h3,
        .card-header p {
            color: white !important;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #4361ee;
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4361ee, #3f37c9);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.3);
        }
        
        #result {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1rem 0;
            white-space: pre-wrap;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            word-break: break-all;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .copy-btn {
            background: linear-gradient(135deg, #4361ee, #3f37c9) !important;
            color: white !important;
            border: none !important;
            padding: 0.75rem 2rem !important;
            border-radius: 12px !important;
            font-size: 1rem !important;
            font-weight: 500 !important;
            transition: all 0.3s ease !important;
            display: inline-flex !important;
            align-items: center !important;
            gap: 0.5rem !important;
        }
        
        .copy-btn:hover {
            background: linear-gradient(135deg, #3f37c9, #3a2cb5) !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.3) !important;
        }
        
        .success-message {
            color: #10b981;
            font-size: 0.875rem;
            margin-left: 0.5rem;
            display: none;  /* 默认隐藏 */
            align-items: center;
            gap: 0.25rem;
        }
        
        .success-message.show {
            display: inline;
            opacity: 1;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sql-container {
                margin: 1rem auto;
                padding: 0 0.5rem;
            }
            
            .card-header {
                padding: 1rem;
            }
            
            .card-body {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            textarea {
                min-height: 150px;
                font-size: 13px;
            }
            
            #result {
                font-size: 13px;
                padding: 1rem;
            }
            
            .result-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }
            
            .copy-btn {
                width: 100%;
                justify-content: center;
            }
            
            .btn-primary {
                width: 100%;
                padding: 1rem;
            }
        }
        
        /* 暗色主题支持 */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
                color: #f1f5f9;
            }
            
            .card {
                background: #1e293b;
            }
            
            textarea {
                background: #334155;
                border-color: #475569;
                color: #f1f5f9;
            }
            
            textarea:focus {
                background: #334155;
            }
            
            #result {
                background: #334155;
                border-color: #475569;
                color: #f1f5f9;
            }
        }
    
</style>
