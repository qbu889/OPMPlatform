{% extends "base.html" %}

{% block title %}Word 转 Markdown{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0"><i class="fas fa-file-word me-2"></i>Word 转 Markdown 文件</h3>
        </div>
        <div class="card-body">
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="word_file" class="form-label">选择 Word 文件 (.docx)</label>
                    <input class="form-control" type="file" id="word_file" name="word_file" accept=".docx" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-upload me-1"></i>上传并转换
                </button>
            </form>

            {% if markdown %}
                <hr class="my-4" />
                <h4 class="mb-3">转换结果（Markdown 格式）:</h4>
                <textarea class="form-control" rows="20" readonly>{{ markdown }}</textarea>
                <button class="btn btn-success mt-2" onclick="copyMarkdown()">
                    <i class="fas fa-copy me-1"></i>复制结果
                </button>
            {% endif %}
        </div>
    </div>
</div>

<script>
function copyMarkdown() {
    const textarea = document.querySelector('textarea');
    textarea.select();
    document.execCommand('copy');
    alert('已复制到剪贴板!');
}
</script>
{% endblock %}
