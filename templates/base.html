<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}文档转换系统{% endblock %}</title>
    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/vendor/fontawesome/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #3a56d6;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --success-color: #4ade80;
            --warning-color: #fbbf24;
            --danger-color: #f87171;
            --info-color: #60a5fa;
            
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-accent: #f1f5f9;
            
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            --border-color: #e2e8f0;
            --border-radius: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            
            --transition-fast: 150ms ease;
            --transition-normal: 300ms ease;
            --transition-slow: 500ms ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #cffafe 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* 容器样式 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
        }
        
        /* 头部样式 */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }
        
        header h1 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* 导航标签页样式 */
        .nav-tabs {
            border: none;
            gap: 0.5rem;
        }
        
        .nav-tabs .nav-link {
            border: 2px solid transparent;
            border-radius: var(--border-radius);
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }
        
        .nav-tabs .nav-link:hover {
            color: var(--primary-color);
            background: var(--bg-accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-color: var(--primary-color);
            box-shadow: var(--shadow-md);
        }
        
        /* 卡片样式 */
        .card {
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-normal);
            overflow: hidden;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--bg-accent), #e0f2fe);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem;
            font-weight: 600;
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        /* 按钮样式 */
        .btn {
            border-radius: var(--border-radius);
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            transition: all var(--transition-normal);
            border: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left var(--transition-slow);
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #22c55e);
            color: white;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #f59e0b);
            color: white;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--danger-color), #ef4444);
            color: white;
        }
        
        /* 表单样式 */
        .form-control, .form-select {
            border-radius: var(--border-radius);
            border: 2px solid var(--border-color);
            padding: 0.75rem 1rem;
            transition: all var(--transition-normal);
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
            outline: none;
        }
        
        .form-label {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        /* 警告框样式 */
        .alert {
            border-radius: var(--border-radius);
            border: none;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        
        .alert-info {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
        }
        
        .alert-success {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #166534;
        }
        
        .alert-warning {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }
        
        .alert-danger {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
        }
        
        /* 动画效果 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        .animate-pulse {
            animation: pulse 2s infinite;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-container {
                padding: 1rem;
            }
            
            header h1 {
                font-size: 1.5rem;
            }
            
            .nav-tabs .nav-link {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-accent);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-hover);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="animate-fade-in-up">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-cogs me-3"></i>诺基亚OPM系统</h1>
                <div class="d-flex gap-2">
                    <span class="badge bg-primary rounded-pill px-3 py-2">
                        <i class="fas fa-circle me-1"></i>在线
                    </span>
                </div>
            </div>
            
            <nav class="nav nav-tabs">
                <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                    <i class="fas fa-home me-2"></i>首页
                </a>
                <!-- <a class="nav-link {% if request.endpoint == 'upload_demo_page' %}active{% endif %}" href="/upload-demo-page">上传Demo模板</a> -->
                <!-- <a class="nav-link {% if request.endpoint == 'convert_page' %}active{% endif %}" href="/convert-page">转换文档</a> -->
            </nav>
        </header>

        <main class="animate-fade-in-up" style="animation-delay: 0.2s;">
            {% block content %}{% endblock %}
        </main>

        <footer class="mt-5 text-center text-muted animate-fade-in-up" style="animation-delay: 0.4s;">
            <div class="py-4 border-top">
                <p class="mb-1">&copy; 2025 诺基亚OPM系统</p>
                <small class="text-secondary">
                    <i class="fas fa-code me-1">用心打造每一个细节</i>
                </small>
            </div>
        </footer>
    </div>

    <script src="/static/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="/static/js/utils.js"></script>
    <script>
        // 页面特定的初始化代码
        document.addEventListener('DOMContentLoaded', function() {
            // 为导航链接添加激活状态动画
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => {
                link.addEventListener('click', function() {
                    // 移除所有激活状态
                    navLinks.forEach(l => l.classList.remove('active'));
                    // 添加当前激活状态
                    this.classList.add('active');
                });
            });
            
            // 为主题切换添加支持
            const themeToggle = document.createElement('button');
            themeToggle.className = 'btn btn-outline-secondary ms-2';
            themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            themeToggle.title = '切换主题';
            
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark-theme');
                const icon = this.querySelector('i');
                if (document.body.classList.contains('dark-theme')) {
                    icon.className = 'fas fa-sun';
                    OPM.storage.set('theme', 'dark');
                } else {
                    icon.className = 'fas fa-moon';
                    OPM.storage.set('theme', 'light');
                }
            });
            
            // 恢复保存的主题
            const savedTheme = OPM.storage.get('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            
            // 添加主题切换按钮到头部
            const headerActions = document.querySelector('header .d-flex');
            if (headerActions) {
                headerActions.appendChild(themeToggle);
            }
        });
    </script>
</body>
</html>
