<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标显示测试</title>
    <link href="/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/vendor/fontawesome/all.min.css">
    <style>
        body {
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .test-icon {
            font-size: 2rem;
            margin: 10px;
            display: inline-block;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Font Awesome 图标显示测试</h1>
    
    <div class="test-section">
        <h3>常用图标测试:</h3>
        <i class="fas fa-home test-icon"></i>
        <i class="fas fa-user test-icon"></i>
        <i class="fas fa-cog test-icon"></i>
        <i class="fas fa-heart test-icon"></i>
        <i class="fas fa-star test-icon"></i>
        <i class="fas fa-envelope test-icon"></i>
        <i class="fas fa-search test-icon"></i>
        <i class="fas fa-download test-icon"></i>
    </div>
    
    <div class="test-section">
        <h3>品牌图标测试:</h3>
        <i class="fab fa-github test-icon"></i>
        <i class="fab fa-python test-icon"></i>
        <i class="fab fa-html5 test-icon"></i>
        <i class="fab fa-css3 test-icon"></i>
        <i class="fab fa-js test-icon"></i>
        <i class="fab fa-bootstrap test-icon"></i>
    </div>
    
    <div class="test-section">
        <h3>常规图标测试:</h3>
        <i class="far fa-heart test-icon"></i>
        <i class="far fa-star test-icon"></i>
        <i class="far fa-envelope test-icon"></i>
        <i class="far fa-clock test-icon"></i>
    </div>
    
    <div class="test-section">
        <h3>如果图标正常显示，你应该能看到各种图标而不是方块或空白。</h3>
        <p>如果仍然看不到图标，请检查浏览器开发者工具中的网络面板，查看字体文件是否成功加载。</p>
    </div>
</body>
</html>
