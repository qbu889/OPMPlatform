[pytest]
testpaths = tests/ui
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出配置
console_output_style = classic
addopts = -v --tb=short --color=yes

# 标记配置
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    ui: marks UI automation tests

# 超时配置
timeout = 60
