name: Python Automated Tests

on:
  push:
    branches: [ main, master, develop, 'q/*' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 12345678
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        if [ -f requirements-linux.txt ]; then
          pip install -r requirements-linux.txt
        fi
        # 安装测试依赖
        pip install pytest pytest-cov pytest-flask
    
    - name: Create .env file for testing
      run: |
        cat > .env << EOF
        # Test Environment Configuration
        FLASK_ENV=testing
        SECRET_KEY=test-secret-key-for-ci
        
        # MySQL Database Configuration
        USE_MYSQL=true
        MYSQL_HOST=localhost
        MYSQL_PORT=3306
        MYSQL_USER=root
        MYSQL_PASSWORD=12345678
        MYSQL_CHARSET=utf8mb4
        
        # Ollama Configuration (disabled in CI)
        OLLAMA_BASE_URL=http://localhost:11434
        OLLAMA_MODEL=qwen3:4b
        
        # Logging Configuration
        LOG_LEVEL=ERROR
        LOG_TO_CONSOLE=true
        LOG_TO_FILE=false
        EOF
    
    - name: Run Kafka Generator tests
      run: |
        echo "========== Running Kafka Generator Tests =========="
        pytest test/kafka/test_kafka_complete.py -v \
          --cov=routes.kafka.kafka_generator_routes \
          --cov-report=term-missing \
          --tb=short \
          --disable-warnings
        
        echo "========== Running Kafka API Tests =========="
        pytest test/kafka/test_kafka_api.py -v \
          --cov=routes.kafka.kafka_generator_routes \
          --cov-report=term-missing \
          --tb=short \
          --disable-warnings
    
    - name: Run all tests with pytest
      run: |
        # 运行所有测试并生成覆盖率报告
        pytest test/ -v \
          --cov=. \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          -m "not slow" \
          --tb=short \
          --maxfail=5 \
          --disable-warnings
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        env_vars: OS,PYTHON
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          .coverage
