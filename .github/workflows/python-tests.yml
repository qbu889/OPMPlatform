name: Python Automated Tests

on:
  push:
    branches: [ main, master, develop, 'q/*' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 12345678
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        if [ -f requirements-linux.txt ]; then
          pip install -r requirements-linux.txt
        fi
        # 安装测试依赖
        pip install pytest pytest-cov pytest-flask
    
    - name: Create .env file for testing
      run: |
        cat > .env << EOF
        # Test Environment Configuration
        FLASK_ENV=testing
        SECRET_KEY=test-secret-key-for-ci
        
        # MySQL Database Configuration
        USE_MYSQL=true
        MYSQL_HOST=localhost
        MYSQL_PORT=3306
        MYSQL_USER=root
        MYSQL_PASSWORD=12345678
        MYSQL_CHARSET=utf8mb4
        
        # Ollama Configuration (disabled in CI)
        OLLAMA_BASE_URL=http://localhost:11434
        OLLAMA_MODEL=qwen3:4b
        
        # Logging Configuration
        LOG_LEVEL=ERROR
        LOG_TO_CONSOLE=true
        LOG_TO_FILE=false
        EOF
    
    - name: Run Kafka Generator tests
      run: |
        echo "========== Running Kafka Generator Tests =========="
        echo "📋 Test files:"
        echo "  - test/kafka/test_kafka_complete.py"
        echo "  - test/kafka/test_kafka_api.py"
        echo ""
        
        pytest test/kafka/test_kafka_complete.py test/kafka/test_kafka_api.py -v \
          --cov=routes.kafka.kafka_generator_routes \
          --cov-report=term-missing \
          --tb=short \
          --disable-warnings \
          || echo "⚠️  Kafka tests completed with some failures"
    
    - name: Run other unit tests
      run: |
        echo "========== Running Other Unit Tests =========="
        echo "📋 Test files:"
        find test/ -name "test_*.py" -not -path "test/kafka/*" | sort | while read file; do
          echo "  - $file"
        done
        echo ""
        
        # 运行除Kafka外的其他测试
        pytest test/ \
          --ignore=test/kafka/ \
          -v \
          --cov=. \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          -m "not slow" \
          --tb=short \
          --disable-warnings \
          --no-cov-on-fail \
          || echo "⚠️  Unit tests completed with some failures"
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        env_vars: OS,PYTHON
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Test Summary
      if: always()
      run: |
        echo "## 📊 测试执行摘要" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ✅ 执行的测试文件" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Kafka 测试:**" >> $GITHUB_STEP_SUMMARY
        echo "- test/kafka/test_kafka_complete.py" >> $GITHUB_STEP_SUMMARY
        echo "- test/kafka/test_kafka_api.py" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**其他单元测试:**" >> $GITHUB_STEP_SUMMARY
        find test/ -name "test_*.py" -not -path "test/kafka/*" | sort | while read file; do
          echo "- $file" >> $GITHUB_STEP_SUMMARY
        done
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # 检查覆盖率文件是否生成
        if [ -f "coverage.xml" ]; then
          echo "### ✅ 覆盖率报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- coverage.xml: ✅ 已生成" >> $GITHUB_STEP_SUMMARY
          echo "- htmlcov/: ✅ 已生成" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ 覆盖率报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️  覆盖率文件未生成，请检查测试执行日志" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          .coverage
          coverage.xml
        retention-days: 7
