{% extends "base.html" %}

{% block title %}用户注册 - OPM系统{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 mt-5">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus" style="font-size: 3rem; color: var(--primary-color);"></i>
                        <h2 class="mt-3">用户注册</h2>
                        <p class="text-muted">创建您的OPM系统账户</p>
                    </div>
                    
                    <form id="registerForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">用户名 *</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <input type="text" class="form-control" id="username" name="username" required 
                                           minlength="3" maxlength="20" placeholder="3-20位字母数字下划线">
                                </div>
                                <div class="form-text">用户名长度3-20位，可包含中文</div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">邮箱 *</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-envelope"></i>
                                    </span>
                                    <input type="email" class="form-control" id="email" name="email" required 
                                           placeholder="example@email.com">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">密码 *</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-key"></i>
                                    </span>
                                    <input type="password" class="form-control" id="password" name="password" required 
                                           minlength="8" placeholder="至少8位，包含字母和数字">
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="form-text">密码需包含字母和数字，至少8位</div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="confirm_password" class="form-label">确认密码 *</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-key"></i>
                                    </span>
                                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="security_question" class="form-label">安全问题 *</label>
                            <select class="form-select" id="security_question" name="security_question" required>
                                <option value="">请选择安全问题</option>
                                <option value="您母亲的姓名是？">您母亲的姓名是？</option>
                                <option value="您父亲的姓名是？">您父亲的姓名是？</option>
                                <option value="您的出生地是？">您的出生地是？</option>
                                <option value="您最熟悉的学校名称是？">您最熟悉的学校名称是？</option>
                                <option value="您最喜欢的颜色是？">您最喜欢的颜色是？</option>
                                <option value="您的手机号码后四位是？">您的手机号码后四位是？</option>
                                <option value="其他">其他（请在下方输入）</option>
                            </select>
                        </div>
                        
                        <div class="mb-3" id="customQuestionDiv" style="display: none;">
                            <label for="custom_question" class="form-label">自定义安全问题 *</label>
                            <input type="text" class="form-control" id="custom_question" name="custom_question" 
                                   placeholder="请输入您的安全问题">
                        </div>
                        
                        <div class="mb-3">
                            <label for="security_answer" class="form-label">安全问题答案 *</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="fas fa-shield-alt"></i>
                                </span>
                                <input type="text" class="form-control" id="security_answer" name="security_answer" 
                                       required minlength="2" placeholder="请输入答案">
                            </div>
                            <div class="form-text">答案将用于找回密码，请牢记</div>
                        </div>
                        
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                我同意 <a href="#" class="text-decoration-none">用户协议</a> 和 <a href="#" class="text-decoration-none">隐私政策</a>
                            </label>
                        </div>
                        
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-success btn-lg" id="registerBtn">
                                <i class="fas fa-user-plus me-2"></i>注册账户
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center">
                        <a href="{{ url_for('auth.login_page') }}" class="text-decoration-none">
                            已有账户？立即登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const securityQuestionSelect = document.getElementById('security_question');
    const customQuestionDiv = document.getElementById('customQuestionDiv');
    const customQuestionInput = document.getElementById('custom_question');
    
    // 密码显示/隐藏切换
    document.getElementById('togglePassword').addEventListener('click', function() {
        togglePasswordVisibility('password', this);
    });
    
    document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
        togglePasswordVisibility('confirm_password', this);
    });
    
    function togglePasswordVisibility(inputId, button) {
        const input = document.getElementById(inputId);
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        button.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
    }
    
    // 安全问题选择处理
    securityQuestionSelect.addEventListener('change', function() {
        if (this.value === '其他') {
            customQuestionDiv.style.display = 'block';
            customQuestionInput.required = true;
        } else {
            customQuestionDiv.style.display = 'none';
            customQuestionInput.required = false;
            customQuestionInput.value = '';
        }
    });
    
    // 实时密码确认验证
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm_password');
    
    confirmPasswordInput.addEventListener('input', function() {
        if (this.value && passwordInput.value !== this.value) {
            this.setCustomValidity('两次输入的密码不一致');
        } else {
            this.setCustomValidity('');
        }
    });
    
    // 用户名实时验证
    const usernameInput = document.getElementById('username');
    usernameInput.addEventListener('input', function() {
        const username = this.value;
        const pattern = /^[a-zA-Z0-9_\u4e00-\u9fa5]+$/;
        
        if (username.length > 0 && username.length < 3) {
            this.setCustomValidity('用户名至少3个字符');
        } else if (username.length > 20) {
            this.setCustomValidity('用户名不能超过20个字符');
        } else if (username.length > 0 && !pattern.test(username)) {
            this.setCustomValidity('用户名只能包含字母、数字、下划线和中文');
        } else {
            this.setCustomValidity('');
        }
    });
    
    // 邮箱实时验证
    const emailInput = document.getElementById('email');
    emailInput.addEventListener('input', function() {
        const email = this.value;
        const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if (email.length > 0 && !pattern.test(email)) {
            this.setCustomValidity('请输入有效的邮箱地址');
        } else {
            this.setCustomValidity('');
        }
    });
    
    // 注册表单提交
    registerForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // 获取表单数据
        const formData = new FormData(this);
        let securityQuestion = formData.get('security_question');
        
        // 处理自定义安全问题
        if (securityQuestion === '其他') {
            securityQuestion = formData.get('custom_question');
        }
        
        const registerData = {
            username: formData.get('username'),
            email: formData.get('email'),
            password: formData.get('password'),
            confirm_password: formData.get('confirm_password'),
            security_question: securityQuestion,
            security_answer: formData.get('security_answer')
        };
        
        // 前端验证
        if (!validateForm(registerData)) {
            return;
        }
        
        // 禁用按钮并显示加载状态
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>注册中...';
        
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(registerData)
            });
            
            const result = await response.json();
            
            if (result.success) {
                showNotification('注册成功！即将跳转到登录页面...', 'success');
                
                // 延迟跳转到登录页面
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } else {
                showNotification(result.message || '注册失败', 'error');
            }
        } catch (error) {
            console.error('注册错误:', error);
            showNotification('网络错误，请稍后重试', 'error');
        } finally {
            // 恢复按钮状态
            registerBtn.disabled = false;
            registerBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>注册账户';
        }
    });
    
    // 表单验证函数
    function validateForm(data) {
        // 基本验证已在HTML中通过required属性处理
        // 这里可以添加额外的验证逻辑
        
        if (data.password !== data.confirm_password) {
            showNotification('两次输入的密码不一致', 'error');
            return false;
        }
        
        if (data.security_question.length < 5) {
            showNotification('安全问题至少5个字符', 'error');
            return false;
        }
        
        if (data.security_answer.length < 2) {
            showNotification('安全答案至少2个字符', 'error');
            return false;
        }
        
        return true;
    }
    
    // 显示通知函数
    function showNotification(message, type = 'info') {
        // 移除现有的通知
        const existingToast = document.querySelector('.toast');
        if (existingToast) {
            existingToast.remove();
        }
        
        // 创建通知元素
        const toastHTML = `
            <div class="toast align-items-center text-white bg-${type === 'success' ? 'success' : type === 'error' ? 'danger' : 'primary'} border-0 position-fixed top-0 end-0 m-3" 
                 role="alert" aria-live="assertive" aria-atomic="true" style="z-index: 1050;">
                <div class="d-flex">
                    <div class="toast-body">
                        ${message}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', toastHTML);
        
        // 显示通知
        const toastEl = document.querySelector('.toast:last-child');
        const toast = new bootstrap.Toast(toastEl);
        toast.show();
        
        // 自动移除
        toastEl.addEventListener('hidden.bs.toast', function() {
            this.remove();
        });
    }
});
</script>
{% endblock %}
