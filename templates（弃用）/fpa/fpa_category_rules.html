<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPA 类别规则管理 - OPM 系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --primary-hover: #3a56d6;
            --secondary-color: #3f37c9;
            --accent-color: #4cc9f0;
            --success-color: #4ade80;
            --warning-color: #fbbf24;
            --danger-color: #f87171;
            --info-color: #60a5fa;
            
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-accent: #f1f5f9;
            
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            
            --border-color: #e2e8f0;
            --border-radius: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #cffafe 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1400px;
        }
        
        /* 导航栏样式 */
        .navbar {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
        }
        
        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
            font-size: 1.25rem;
        }
        
        .navbar-brand:hover {
            color: var(--primary-hover) !important;
        }
        
        .nav-link {
            color: var(--text-secondary) !important;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: var(--border-radius);
            padding: 0.5rem 1rem;
        }
        
        .nav-link:hover {
            color: var(--primary-color) !important;
            background: var(--bg-accent);
        }
        
        .nav-link.active {
            color: var(--primary-color) !important;
            background: var(--bg-accent);
        }
        
        /* 卡片样式 */
        .card {
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, var(--bg-accent), #e0f2fe);
            border-bottom: 1px solid var(--border-color);
            padding: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .card-body {
            padding: 1.5rem;
            background: var(--bg-primary);
        }
        
        /* 表单样式 */
        .form-label {
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }
        
        .form-control::placeholder {
            color: var(--text-muted);
            opacity: 1;
        }
        
        .form-control, .form-select {
            border-radius: var(--border-radius);
            border: 2px solid var(--border-color);
            padding: 0.625rem 0.875rem;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(67, 97, 238, 0.15);
            outline: none;
            background-color: #fafbff;
        }
        
        /* 按钮样式 */
        .btn {
            border-radius: var(--border-radius);
            padding: 0.625rem 1.25rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            font-size: 0.875rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--text-secondary), var(--text-muted));
            color: white;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.3);
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
        }
        
        /* 按钮加载状态 */
        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        
        /* 表格样式 */
        .table {
            margin-bottom: 0;
        }
        
        .table thead th {
            background: var(--bg-accent);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8125rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border-color);
            padding: 0.75rem;
        }
        
        .table tbody td {
            padding: 0.75rem;
            vertical-align: middle;
            font-size: 0.875rem;
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        
        .table-hover tbody tr:hover {
            background-color: var(--bg-accent);
            transition: all 0.2s ease;
        }
        
        /* Badge 样式 */
        .badge {
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.75rem;
        }
        
        .badge-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }
        
        .badge-success {
            background: linear-gradient(135deg, var(--success-color), #22c55e);
        }
        
        .badge-secondary {
            background: linear-gradient(135deg, var(--text-secondary), var(--text-muted));
        }
        
        /* Badge 状态样式 */
        .badge-active {
            background: linear-gradient(135deg, var(--success-color), #22c55e);
        }
        
        .badge-inactive {
            background: linear-gradient(135deg, var(--text-secondary), var(--text-muted));
        }
        
        /* 规则项样式 */
        .rule-item {
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }
        
        .rule-item:hover {
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        /* 关键词代码样式 */
        code {
            background: var(--bg-accent);
            color: var(--primary-color);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.875em;
            font-weight: 500;
        }
        
        .category-EI { border-left-color: #3b82f6; }
        .category-EO { border-left-color: #22c55e; }
        .category-EQ { border-left-color: #f59e0b; }
        .category-ILF { border-left-color: #ef4444; }
        .category-EIF { border-left-color: #8b5cf6; }
        
        /* 分页样式 */
        .pagination .page-link {
            border-radius: var(--border-radius);
            border: 2px solid var(--border-color);
            color: var(--primary-color);
            padding: 0.5rem 0.875rem;
            margin: 0 0.25rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .pagination .page-item.active .page-link {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: var(--primary-color);
            color: white;
        }
        
        .pagination .page-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(67, 97, 238, 0.2);
        }
        
        .pagination .page-item.disabled .page-link {
            color: var(--text-muted);
            pointer-events: none;
            background-color: var(--bg-secondary);
            border-color: var(--border-color);
        }
        
        /* 筛选区域样式 */
        .filter-section {
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .filter-section:hover {
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.1);
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .navbar-brand {
                font-size: 1rem;
            }
            
            .table-responsive {
                border-radius: var(--border-radius);
            }
            
            .filter-section h6 {
                font-size: 0.9rem;
            }
            
            .btn-sm {
                font-size: 0.75rem;
                padding: 0.25rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white rounded shadow-sm mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-cubes me-2"></i>OPM 系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="fas fa-home me-1"></i>首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/fpa-rules/management">
                            <i class="fas fa-ruler me-1"></i>FPA 规则管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/fpa-generator"><i class="fas fa-file-excel me-1"></i>FPA 生成器</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- 页面标题 -->
        <div class="card mb-4">
            <div class="card-body text-center" style="background: linear-gradient(135deg, var(--bg-accent), #e0f2fe);">
                <h2 class="mb-2" style="color: var(--primary-color); font-weight: 700;">
                    <i class="fas fa-ruler me-2"></i>FPA 类别规则管理
                </h2>
                <p class="text-muted mb-0">配置和管理 FPA 功能点的自动分类规则</p>
            </div>
        </div>
        
        <!-- 添加规则卡片 -->
        <div class="card">
            <div class="card-header" style="background: linear-gradient(135deg, var(--bg-accent), #e0f2fe); color: var(--primary-color);">
                <i class="fas fa-plus-circle me-2"></i>添加类别判断规则
            </div>
            <div class="card-body">
                <form id="addRuleForm">
                    <div class="row">
                        <div class="col-md-2">
                            <div class="mb-3">
                                <label for="ruleCategory" class="form-label">类别 *</label>
                                <select class="form-select" id="ruleCategory" required>
                                    <option value="EI">EI</option>
                                    <option value="EO">EO</option>
                                    <option value="EQ">EQ</option>
                                    <option value="ILF">ILF</option>
                                    <option value="EIF">EIF</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="mb-3">
                                <label for="rulePriority" class="form-label">优先级 *</label>
                                <input type="number" class="form-control" id="rulePriority" required value="1" min="1">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="mb-3">
                                <label for="ruleType" class="form-label">规则类型 *</label>
                                <select class="form-select" id="ruleType" required>
                                    <option value="contains">包含</option>
                                    <option value="endswith">结尾</option>
                                    <option value="startswith">开头</option>
                                    <option value="special">特殊</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="mb-3">
                                <label for="ruleKeyword" class="form-label">关键词 *</label>
                                <input type="text" class="form-control" id="ruleKeyword" required placeholder="如：表、查询">
                            </div>
                        </div>
                        <div class="col-md-2">
                            <div class="mb-3">
                                <label for="ruleUfpValue" class="form-label">UFP 值 *</label>
                                <input type="number" class="form-control" id="ruleUfpValue" required value="7">
                            </div>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100" style="white-space: nowrap;">
                                <i class="fas fa-plus me-1"></i>添加
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="ruleDescription" class="form-label">规则描述</label>
                        <input type="text" class="form-control" id="ruleDescription" placeholder="规则描述">
                    </div>
                </form>
            </div>
        </div>

        <!-- 规则列表卡片 -->
        <div class="card">
            <div class="card-header" style="background: linear-gradient(135deg, var(--bg-accent), #e0f2fe); color: var(--primary-color);">
                <i class="fas fa-list me-2"></i>FPA 类别判断规则列表
            </div>
            <div class="card-body">
                <!-- 筛选条件 -->
                <div class="filter-section">
                    <h6 class="mb-3" style="color: var(--primary-color); font-weight: 600;">
                        <i class="fas fa-filter me-2"></i>筛选条件
                    </h6>
                    <div class="row">
                    <div class="col-md-2">
                        <label for="filterCategory" class="form-label">类别</label>
                        <select class="form-select" id="filterCategory">
                            <option value="">全部</option>
                            <option value="EI">EI</option>
                            <option value="EO">EO</option>
                            <option value="EQ">EQ</option>
                            <option value="ILF">ILF</option>
                            <option value="EIF">EIF</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="filterActive" class="form-label">状态</label>
                        <select class="form-select" id="filterActive">
                            <option value="">全部</option>
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="filterKeyword" class="form-label">关键词</label>
                        <input type="text" class="form-control" id="filterKeyword" placeholder="输入关键词">
                    </div>
                    <div class="col-md-2">
                        <label for="filterPriority" class="form-label">优先级</label>
                        <select class="form-select" id="filterPriority">
                            <option value="">全部</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="filterPerPage" class="form-label">每页显示</label>
                        <select class="form-select" id="filterPerPage">
                            <option value="10">10 条</option>
                            <option value="20" selected>20 条</option>
                            <option value="50">50 条</option>
                            <option value="100">100 条</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="loadRules()">
                            <i class="fas fa-search me-1"></i>查询
                        </button>
                    </div>
                </div>
                
                <!-- 重置按钮 -->
                <div class="row mt-3">
                    <div class="col-md-12 text-end">
                        <button class="btn btn-secondary" onclick="resetFilters()">
                            <i class="fas fa-redo me-1"></i>重置所有筛选
                        </button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr style="background: var(--bg-accent);">
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">优先级</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">类别</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">规则类型</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">关键词</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">描述</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">UFP 值</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">状态</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">创建时间</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">更新时间</th>
                                <th style="color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="ruleList">
                            <!-- 规则列表将通过 JS 动态加载 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页控件 -->
                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-center" id="pagination">
                        <!-- 分页将通过 JS 动态生成 -->
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content" style="border-radius: var(--border-radius); border: none; box-shadow: var(--shadow-lg);">
                <div class="modal-header" style="background: linear-gradient(135deg, var(--bg-accent), #e0f2fe); border-bottom: 1px solid var(--border-color); border-radius: var(--border-radius) var(--border-radius) 0 0;">
                    <h5 class="modal-title" style="color: var(--primary-color); font-weight: 600;">
                        <i class="fas fa-edit me-2"></i>编辑规则
                    </h5>
                    <button type="button" class="close" data-bs-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editRuleId">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="editCategory" class="form-label">类别</label>
                                <select class="form-select" id="editCategory">
                                    <option value="EI">EI</option>
                                    <option value="EO">EO</option>
                                    <option value="EQ">EQ</option>
                                    <option value="ILF">ILF</option>
                                    <option value="EIF">EIF</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="editPriority" class="form-label">优先级</label>
                                <input type="number" class="form-control" id="editPriority" min="1">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="editUfpValue" class="form-label">UFP 值</label>
                                <input type="number" class="form-control" id="editUfpValue">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="editRuleType" class="form-label">规则类型</label>
                                <select class="form-select" id="editRuleType">
                                    <option value="contains">包含</option>
                                    <option value="endswith">结尾</option>
                                    <option value="startswith">开头</option>
                                    <option value="special">特殊</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="editKeyword" class="form-label">关键词</label>
                                <input type="text" class="form-control" id="editKeyword">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editDescription" class="form-label">描述</label>
                        <input type="text" class="form-control" id="editDescription">
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="editActive">
                            <label class="form-check-label" for="editActive">
                                启用
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border-color); background: var(--bg-secondary); border-radius: 0 0 var(--border-radius) var(--border-radius);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-1"></i>取消
                    </button>
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">
                        <i class="fas fa-save me-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/sweetalert2/11.7.0/sweetalert2.all.min.js"></script>
    <script>
        let editModal;
        let currentPage = 1;
        let totalPages = 0;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            editModal = new bootstrap.Modal(document.getElementById('editModal'));
            loadRules();
            
            // 为所有筛选条件添加回车搜索功能
            document.getElementById('filterKeyword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loadRules();
                }
            });
        });

        // 加载规则列表
        function loadRules() {
            const category = document.getElementById('filterCategory').value;
            const isActive = document.getElementById('filterActive').value;
            const keyword = document.getElementById('filterKeyword').value;
            const priority = document.getElementById('filterPriority').value;
            const perPage = parseInt(document.getElementById('filterPerPage').value);
            
            let url = `/fpa-rules/api/rules?page=${currentPage}&per_page=${perPage}`;
            if (category) url += `&category=${category}`;
            if (isActive !== '') url += `&is_active=${isActive}`;
            if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;
            if (priority) url += `&priority=${priority}`;
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.rules) {
                        renderRules(data.rules);
                        renderPagination(data.page, data.pages, data.total);
                        totalPages = data.pages;
                    }
                })
                .catch(error => {
                    console.error('加载失败:', error);
                    Swal.fire('错误', '加载规则列表失败', 'error');
                });
        }

        // 渲染规则列表
        function renderRules(rules) {
            const container = document.getElementById('ruleList');
            container.innerHTML = '';

            if (rules.length === 0) {
                container.innerHTML = '<tr><td colspan="10" class="text-center text-muted" style="padding: 3rem; color: var(--text-muted) !important;">暂无规则</td></tr>';
                return;
            }

            rules.forEach(rule => {
                const row = document.createElement('tr');
                row.className = `rule-item category-${rule.category}`;
                row.innerHTML = `
                    <td><span class="badge badge-secondary">${rule.priority}</span></td>
                    <td><span class="badge badge-primary">${rule.category}</span></td>
                    <td>${getRuleTypeText(rule.rule_type)}</td>
                    <td><code>${rule.keyword}</code></td>
                    <td>${rule.description || '-'}</td>
                    <td><span class="badge badge-success">${rule.ufp_value}</span></td>
                    <td>
                        <span class="badge ${rule.is_active ? 'badge-active' : 'badge-inactive'}">
                            ${rule.is_active ? '启用' : '禁用'}
                        </span>
                    </td>
                    <td><small style="color: var(--text-muted);">${rule.created_at || '-'}</small></td>
                    <td><small style="color: var(--text-muted);">${rule.updated_at || '-'}</small></td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="editRule(${rule.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteRule(${rule.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                container.appendChild(row);
            });
        }

        // 获取规则类型文本
        function getRuleTypeText(type) {
            const map = {
                'contains': '包含',
                'endswith': '结尾',
                'startswith': '开头',
                'special': '特殊'
            };
            return map[type] || type;
        }

        // 重置筛选条件
        function resetFilters() {
            document.getElementById('filterCategory').value = '';
            document.getElementById('filterActive').value = '';
            document.getElementById('filterKeyword').value = '';
            document.getElementById('filterPriority').value = '';
            document.getElementById('filterPerPage').value = '20';
            currentPage = 1;
            loadRules();
        }

        // 渲染分页
        function renderPagination(current, total, recordCount) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            if (total <= 1) return; // 只有一页时不显示分页
            
            // 上一页
            const prevLi = document.createElement('li');
            prevLi.className = `page-item ${current === 1 ? 'disabled' : ''}`;
            prevLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${current - 1}); return false;">« 上一页</a>`;
            pagination.appendChild(prevLi);
            
            // 页码
            let startPage = Math.max(1, current - 2);
            let endPage = Math.min(total, current + 2);
            
            if (startPage > 1) {
                const firstLi = document.createElement('li');
                firstLi.className = 'page-item';
                firstLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(1); return false;">1</a>`;
                pagination.appendChild(firstLi);
                
                if (startPage > 2) {
                    const ellipsisLi = document.createElement('li');
                    ellipsisLi.className = 'page-item disabled';
                    ellipsisLi.innerHTML = '<span class="page-link">...</span>';
                    pagination.appendChild(ellipsisLi);
                }
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === current ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>`;
                pagination.appendChild(li);
            }
            
            if (endPage < total) {
                if (endPage < total - 1) {
                    const ellipsisLi = document.createElement('li');
                    ellipsisLi.className = 'page-item disabled';
                    ellipsisLi.innerHTML = '<span class="page-link">...</span>';
                    pagination.appendChild(ellipsisLi);
                }
                
                const lastLi = document.createElement('li');
                lastLi.className = 'page-item';
                lastLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${total}); return false;">${total}</a>`;
                pagination.appendChild(lastLi);
            }
            
            // 下一页
            const nextLi = document.createElement('li');
            nextLi.className = `page-item ${current === total ? 'disabled' : ''}`;
            nextLi.innerHTML = `<a class="page-link" href="#" onclick="changePage(${current + 1}); return false;">下一页 »</a>`;
            pagination.appendChild(nextLi);
            
            // 显示总记录数
            const infoLi = document.createElement('li');
            infoLi.className = 'page-item disabled';
            infoLi.innerHTML = `<span class="page-link">共 ${recordCount} 条记录</span>`;
            pagination.appendChild(infoLi);
        }

        // 切换页码
        function changePage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadRules();
        }

        // 添加规则
        document.getElementById('addRuleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const ruleData = {
                category: document.getElementById('ruleCategory').value,
                priority: parseInt(document.getElementById('rulePriority').value),
                rule_type: document.getElementById('ruleType').value,
                keyword: document.getElementById('ruleKeyword').value,
                description: document.getElementById('ruleDescription').value,
                ufp_value: parseInt(document.getElementById('ruleUfpValue').value),
                is_active: true
            };

            fetch('/fpa-rules/api/rules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ruleData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    Swal.fire('成功', '规则添加成功', 'success');
                    loadRules();
                    this.reset();
                } else {
                    Swal.fire('错误', data.error || '添加失败', 'error');
                }
            })
            .catch(error => {
                Swal.fire('错误', '添加规则失败', 'error');
            });
        });

        // 编辑规则
        function editRule(ruleId) {
            fetch(`/fpa-rules/api/rules/${ruleId}`)
                .then(response => response.json())
                .then(rule => {
                    document.getElementById('editRuleId').value = rule.id;
                    document.getElementById('editCategory').value = rule.category;
                    document.getElementById('editPriority').value = rule.priority;
                    document.getElementById('editRuleType').value = rule.rule_type;
                    document.getElementById('editKeyword').value = rule.keyword;
                    document.getElementById('editDescription').value = rule.description || '';
                    document.getElementById('editUfpValue').value = rule.ufp_value;
                    document.getElementById('editActive').checked = rule.is_active;
                    editModal.show();
                })
                .catch(error => {
                    Swal.fire('错误', '加载规则详情失败', 'error');
                });
        }

        // 保存编辑
        function saveEdit() {
            const ruleId = document.getElementById('editRuleId').value;
            const ruleData = {
                category: document.getElementById('editCategory').value,
                priority: parseInt(document.getElementById('editPriority').value),
                rule_type: document.getElementById('editRuleType').value,
                keyword: document.getElementById('editKeyword').value,
                description: document.getElementById('editDescription').value,
                ufp_value: parseInt(document.getElementById('editUfpValue').value),
                is_active: document.getElementById('editActive').checked
            };

            fetch(`/fpa-rules/api/rules/${ruleId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ruleData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    Swal.fire('成功', '规则更新成功', 'success');
                    editModal.hide();
                    loadRules();
                } else {
                    Swal.fire('错误', data.error || '更新失败', 'error');
                }
            })
            .catch(error => {
                Swal.fire('错误', '更新规则失败', 'error');
            });
        }

        // 删除规则
        function deleteRule(ruleId) {
            Swal.fire({
                title: '确认删除',
                text: '确定要删除这条规则吗？',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: '删除',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(`/fpa-rules/api/rules/${ruleId}`, {
                        method: 'DELETE'
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.message) {
                            Swal.fire('成功', '规则删除成功', 'success');
                            loadRules();
                        } else {
                            Swal.fire('错误', data.error || '删除失败', 'error');
                        }
                    })
                    .catch(error => {
                        Swal.fire('错误', '删除规则失败', 'error');
                    });
                }
            });
        }
    </script>
</body>
</html>
