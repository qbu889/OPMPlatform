<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 转换工具</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #cffafe 100%);
            min-height: 100vh;
        }
        
        .converter-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .converter-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin-bottom: 2rem;
        }
        
        .converter-header {
            background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
            color: white;
            padding: 2.5rem;
            text-align: center;
        }
        
        .converter-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
        }
        
        .converter-title i {
            color: #63b3ed;
        }
        
        .converter-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }
        
        .converter-body {
            padding: 2.5rem;
        }
        
        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-keyword {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-keyword:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(72, 187, 120, 0.4);
        }
        
        .form-control {
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            padding: 1rem 1.25rem;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        /* 修复文件选择框显示问题 */
        input[type="file"].form-control {
            padding: 0.5rem 0.75rem;
            height: calc(2.5rem + 2px);
            line-height: 1.5;
        }
        
        input[type="file"].form-control::file-selector-button {
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        input[type="file"].form-control::file-selector-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        /* 关键词列表优化 */
        .keyword-table {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .keyword-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .keyword-table thead th {
            padding: 1rem;
            font-weight: 600;
            border: none;
        }
        
        .keyword-table tbody tr {
            transition: all 0.2s ease;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .keyword-table tbody tr:hover {
            background-color: #f7fafc;
            transform: translateX(4px);
        }
        
        .keyword-table tbody td {
            padding: 0.875rem 1rem;
            vertical-align: middle;
        }
        
        .keyword-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .badge-person {
            background: linear-gradient(135deg, #63b3ed 0%, #4299e1 100%);
            color: white;
        }
        
        .badge-system {
            background: linear-gradient(135deg, #f6ad55 0%, #ed8936 100%);
            color: white;
        }
        
        .btn-action {
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
            margin: 0 0.25rem;
        }
        
        .btn-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }
        
        .btn-edit-action {
            background: linear-gradient(135deg, #4fd1c5 0%, #38b2ac 100%);
            color: white;
            border: none;
        }
        
        .btn-delete-action {
            background: linear-gradient(135deg, #fc8181 0%, #f56565 100%);
            color: white;
            border: none;
        }
        
        .modal-content {
            border-radius: 16px;
            border: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 0 0;
            border: none;
        }
        
        .modal-header .close {
            color: white;
            opacity: 1;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #a0aec0;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .stats-card {
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body>
    <div class="converter-container">
        <!-- 上传转换卡片 -->
        <div class="converter-card">
            <div class="converter-header">
                <h1 class="converter-title">
                    <i class="fas fa-file-markdown me-3"></i>
                    Markdown 上传转换
                </h1>
                <p class="converter-subtitle">将 Markdown 文件转换为 Word 文档</p>
            </div>
            
            <div class="converter-body">
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <form method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="markdown_file" class="form-label">
                            <i class="fas fa-folder-open me-2"></i>选择 Markdown 文件 (.md)
                        </label>
                        <input type="file" name="markdown_file" accept=".md" class="form-control" id="markdown_file" required>
                    </div>
                    <button type="submit" class="btn-upload">
                        <i class="fas fa-upload me-2"></i>上传并转换
                    </button>
                </form>
                
                <div class="mt-4">
                    <button onclick="openKeywordModal()" class="btn-keyword">
                        <i class="fas fa-key me-2"></i>关键词管理
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 关键词管理模态框 -->
    <div id="keywordModal" class="modal fade" tabindex="-1" aria-labelledby="keywordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-key me-2"></i>关键词管理
                    </h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                    <!-- 统计信息 -->
                    <div class="stats-card">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <div class="text-muted mb-1">人工操作关键词</div>
                                        <div class="stats-number" id="personCount">0</div>
                                    </div>
                                    <i class="fas fa-user-edit fa-3x" style="opacity: 0.1;"></i>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <div class="text-muted mb-1">系统操作关键词</div>
                                        <div class="stats-number" id="systemCount">0</div>
                                    </div>
                                    <i class="fas fa-robot fa-3x" style="opacity: 0.1;"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 操作按钮 -->
                    <div class="mb-3">
                        <button onclick="openAddModal('person')" class="btn btn-edit-action btn-action">
                            <i class="fas fa-plus me-1"></i>添加人工关键词
                        </button>
                        <button onclick="openAddModal('system')" class="btn btn-edit-action btn-action">
                            <i class="fas fa-plus me-1"></i>添加系统关键词
                        </button>
                        <button onclick="loadKeywords()" class="btn btn-secondary btn-action">
                            <i class="fas fa-sync-alt me-1"></i>刷新
                        </button>
                    </div>
                    
                    <!-- 关键词表格 -->
                    <div class="table-responsive">
                        <table class="keyword-table">
                            <thead>
                                <tr>
                                    <th style="width: 10%;">类型</th>
                                    <th style="width: 60%;">关键词</th>
                                    <th style="width: 30%;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="keywordTableBody">
                                <tr>
                                    <td colspan="3" class="empty-state">
                                        <i class="fas fa-inbox"></i>
                                        <p>暂无关键词数据</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-info" onclick="openHistoryModal()">
                        <i class="fas fa-history me-1"></i>历史记录
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑关键词模态框 -->
    <div id="keywordEditModal" class="modal fade" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalTitle">
                        <i class="fas fa-edit me-2"></i>添加关键词
                    </h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="keyword-type">
                    <input type="hidden" id="original-keyword">
                    <div class="mb-3">
                        <label for="keyword-input" class="form-label">关键词:</label>
                        <input type="text" id="keyword-input" class="form-control" placeholder="请输入关键词">
                    </div>
                    <div class="mb-3">
                        <label for="keyword-comment" class="form-label">备注:</label>
                        <textarea id="keyword-comment" class="form-control" rows="3" placeholder="可选备注信息"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveKeyword()">
                        <i class="fas fa-save me-1"></i>保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 历史记录模态框 -->
    <div id="historyModal" class="modal fade" tabindex="-1" aria-labelledby="historyModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-history me-2"></i>关键词修改历史
                    </h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                    <div class="mb-3">
                        <button onclick="createSnapshot('person')" class="btn btn-success btn-action">
                            <i class="fas fa-camera me-1"></i>创建人工版本快照
                        </button>
                        <button onclick="createSnapshot('system')" class="btn btn-info btn-action">
                            <i class="fas fa-camera me-1"></i>创建系统版本快照
                        </button>
                        <button onclick="loadHistory()" class="btn btn-secondary btn-action">
                            <i class="fas fa-sync-alt me-1"></i>刷新历史
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                                <tr>
                                    <th style="width: 5%;">ID</th>
                                    <th style="width: 12%;">类型</th>
                                    <th style="width: 12%;">操作</th>
                                    <th style="width: 15%;">关键词</th>
                                    <th style="width: 12%;">原关键词</th>
                                    <th style="width: 18%;">备注</th>
                                    <th style="width: 13%;">操作时间</th>
                                    <th style="width: 13%;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <tr>
                                    <td colspan="7" class="empty-state">
                                        <i class="fas fa-clock"></i>
                                        <p>暂无历史记录</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
    <script>
        let keywordModal, editModal, historyModal;
        
        // 初始化模态框
        $(document).ready(function() {
            keywordModal = new bootstrap.Modal(document.getElementById('keywordModal'));
            editModal = new bootstrap.Modal(document.getElementById('keywordEditModal'));
            historyModal = new bootstrap.Modal(document.getElementById('historyModal'));
        });
        
        // 打开历史记录弹窗
        function openHistoryModal() {
            loadHistory();
            historyModal.show();
        }
        
        // 加载历史记录
        function loadHistory() {
            fetch('/api/keywords/history?page=1&per_page=50')
                .then(response => response.json())
                .then(result => {
                    if (result.status === 'success') {
                        renderHistoryTable(result.data);
                    } else {
                        $('#historyTableBody').html('<tr><td colspan="7" class="text-center text-danger">加载失败</td></tr>');
                    }
                })
                .catch(error => {
                    console.error('Error loading history:', error);
                    $('#historyTableBody').html('<tr><td colspan="7" class="text-center text-danger">加载失败</td></tr>');
                });
        }
        
        // 渲染历史记录表格
        function renderHistoryTable(history) {
            const tbody = $('#historyTableBody');
            
            if (!history || history.length === 0) {
                tbody.html(`
                    <tr>
                        <td colspan="7" class="empty-state">
                            <i class="fas fa-clock"></i>
                            <p>暂无历史记录</p>
                        </td>
                    </tr>
                `);
                return;
            }
            
            let html = '';
            history.forEach(item => {
                const typeBadge = item.keyword_type === 'person_keywords' 
                    ? '<span class="keyword-badge badge-person"><i class="fas fa-user-edit me-1"></i>人工</span>'
                    : '<span class="keyword-badge badge-system"><i class="fas fa-robot me-1"></i>系统</span>';
                
                const actionBadge = {
                    'add': '<span class="badge bg-success"><i class="fas fa-plus me-1"></i>添加</span>',
                    'edit': '<span class="badge bg-info"><i class="fas fa-edit me-1"></i>编辑</span>',
                    'delete': '<span class="badge bg-danger"><i class="fas fa-trash-alt me-1"></i>删除</span>',
                    'snapshot': '<span class="badge bg-primary"><i class="fas fa-camera me-1"></i>版本快照</span>',
                    'restore_add': '<span class="badge bg-warning"><i class="fas fa-undo me-1"></i>恢复添加</span>',
                    'restore_edit': '<span class="badge bg-warning"><i class="fas fa-undo me-1"></i>恢复编辑</span>',
                    'restore_delete': '<span class="badge bg-warning"><i class="fas fa-undo me-1"></i>恢复删除</span>',
                    'restore_snapshot': '<span class="badge bg-warning"><i class="fas fa-undo me-1"></i>恢复快照</span>'
                }[item.action] || '<span class="badge bg-secondary">' + item.action + '</span>';
                
                // 判断是否显示恢复按钮（快照记录显示完整恢复按钮）
                const restoreButton = item.is_snapshot 
                    ? `<button onclick="restoreHistory(${item.id})" class="btn btn-edit-action btn-action" title="恢复到这个完整版本">
                         <i class="fas fa-undo"></i> 完整恢复
                       </button>`
                    : `<button onclick="restoreHistory(${item.id})" class="btn btn-edit-action btn-action" title="恢复此项操作">
                         <i class="fas fa-undo"></i> 恢复
                       </button>`;
                
                html += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${typeBadge}</td>
                        <td>${actionBadge}</td>
                        <td><strong>${item.keyword}</strong></td>
                        <td>${item.original_keyword || '-'}</td>
                        <td>${item.remark || '-'}</td>
                        <td>${formatDateTime(item.created_at)}</td>
                        <td>${restoreButton}</td>
                    </tr>
                `;
            });
            
            tbody.html(html);
        }
        
        // 恢复历史记录
        function restoreHistory(historyId) {
            const message = confirm('确定要恢复到此历史版本吗？')
            if (!message) {
                return;
            }
            
            fetch(`/api/keywords/history/${historyId}/restore`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    // 显示成功提示
                    const toast = $('<div class="alert alert-success position-fixed" style="top: 20px; right: 20px; z-index: 9999;">' +
                                   '<i class="fas fa-check-circle me-2"></i>' + result.message +
                                   '</div>');
                    $('body').append(toast);
                    setTimeout(() => toast.fadeOut(500, () => toast.remove()), 2000);
                    
                    // 获取最新数据并刷新关键词列表
                    loadKeywords().then(() => {
                        // 刷新历史记录
                        loadHistory();
                    });
                } else {
                    alert('恢复失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error restoring history:', error);
                alert('恢复失败');
            });
        }
        
        // 创建版本快照
        function createSnapshot(type) {
            const remark = prompt('请输入版本快照备注（可选）:', '手动创建版本快照');
            if (remark === null) {
                return;
            }
            
            fetch('/api/keywords/snapshot', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    type: type,
                    remark: remark || '手动创建版本快照'
                })
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    // 显示成功提示
                    const toast = $('<div class="alert alert-success position-fixed" style="top: 20px; right: 20px; z-index: 9999;">' +
                                   '<i class="fas fa-check-circle me-2"></i>版本快照创建成功！' +
                                   '</div>');
                    $('body').append(toast);
                    setTimeout(() => toast.fadeOut(500, () => toast.remove()), 2000);
                    
                    // 刷新历史记录
                    loadHistory();
                } else {
                    alert('创建失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error creating snapshot:', error);
                alert('创建失败');
            });
        }
        
        // 格式化时间
        function formatDateTime(datetimeStr) {
            if (!datetimeStr) return '-';
            const date = new Date(datetimeStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        // 打开关键词管理弹窗
        function openKeywordModal() {
            loadKeywords();
            keywordModal.show();
        }
        
        // 打开添加模态框
        function openAddModal(type) {
            document.getElementById('editModalTitle').innerHTML = '<i class="fas fa-plus me-2"></i>添加关键词';
            document.getElementById('keyword-type').value = type + '_keywords';
            document.getElementById('original-keyword').value = '';
            document.getElementById('keyword-input').value = '';
            document.getElementById('keyword-comment').value = '';
            editModal.show();
        }
        
        // 编辑关键词
        function editKeyword(type, keyword) {
            document.getElementById('editModalTitle').innerHTML = '<i class="fas fa-edit me-2"></i>编辑关键词';
            document.getElementById('keyword-type').value = type + '_keywords';
            document.getElementById('original-keyword').value = keyword;
            document.getElementById('keyword-input').value = keyword;
            document.getElementById('keyword-comment').value = '';
            editModal.show();
        }
        
        // 保存关键词
        function saveKeyword() {
            const type = document.getElementById('keyword-type').value;
            const original = document.getElementById('original-keyword').value;
            const keyword = document.getElementById('keyword-input').value;
            const comment = document.getElementById('keyword-comment').value;

            if (!keyword.trim()) {
                alert('请输入关键词');
                return;
            }

            const data = {
                type: type,
                keyword: keyword,
                original: original,
                comment: comment
            };

            fetch('/api/keywords', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    editModal.hide();
                    loadKeywords();
                    // 显示成功提示
                    const toast = $('<div class="alert alert-success position-fixed" style="top: 20px; right: 20px; z-index: 9999;">' +
                                   '<i class="fas fa-check-circle me-2"></i>保存成功！' +
                                   '</div>');
                    $('body').append(toast);
                    setTimeout(() => toast.fadeOut(500, () => toast.remove()), 2000);
                } else {
                    alert('保存失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error saving keyword:', error);
                alert('保存失败');
            });
        }
        
        // 删除关键词
        function deleteKeyword(type, keyword) {
            if (!confirm(`确定要删除关键词 "${keyword}" 吗？`)) {
                return;
            }

            fetch('/api/keywords', {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({type: type, keyword: keyword})
            })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    loadKeywords();
                    // 显示成功提示
                    const toast = $('<div class="alert alert-success position-fixed" style="top: 20px; right: 20px; z-index: 9999;">' +
                                   '<i class="fas fa-check-circle me-2"></i>删除成功！' +
                                   '</div>');
                    $('body').append(toast);
                    setTimeout(() => toast.fadeOut(500, () => toast.remove()), 2000);
                } else {
                    alert('删除失败：' + result.message);
                }
            })
            .catch(error => {
                console.error('Error deleting keyword:', error);
                alert('删除失败');
            });
        }
        
        // 加载关键词
        function loadKeywords() {
            return fetch('/api/keywords')
                .then(response => response.json())
                .then(data => {
                    renderKeywordTable(data.person_keywords, data.system_keywords);
                    updateStats(data.person_keywords.length, data.system_keywords.length);
                    return data; // 返回数据以便后续处理
                })
                .catch(error => {
                    console.error('Error loading keywords:', error);
                    $('#keywordTableBody').html(`
                        <tr>
                            <td colspan="3" class="empty-state">
                                <i class="fas fa-exclamation-triangle"></i>
                                <p>加载失败</p>
                            </td>
                        </tr>
                    `);
                    throw error; // 抛出错误以便调用者知道
                });
        }
        
        // 渲染关键词表格
        function renderKeywordTable(personKeywords, systemKeywords) {
            const tbody = $('#keywordTableBody');
            
            if (personKeywords.length === 0 && systemKeywords.length === 0) {
                tbody.html(`
                    <tr>
                        <td colspan="3" class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>暂无关键词数据</p>
                        </td>
                    </tr>
                `);
                return;
            }
            
            let html = '';
            
            // 人工关键词
            personKeywords.forEach(keyword => {
                html += `
                    <tr>
                        <td><span class="keyword-badge badge-person"><i class="fas fa-user-edit me-1"></i>人工</span></td>
                        <td><strong>${keyword}</strong></td>
                        <td>
                            <button onclick="editKeyword('person', '${keyword}')" class="btn btn-edit-action btn-action">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteKeyword('person', '${keyword}')" class="btn btn-delete-action btn-action">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            // 系统关键词
            systemKeywords.forEach(keyword => {
                html += `
                    <tr>
                        <td><span class="keyword-badge badge-system"><i class="fas fa-robot me-1"></i>系统</span></td>
                        <td><strong>${keyword}</strong></td>
                        <td>
                            <button onclick="editKeyword('system', '${keyword}')" class="btn btn-edit-action btn-action">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteKeyword('system', '${keyword}')" class="btn btn-delete-action btn-action">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.html(html);
        }
        
        // 更新统计
        function updateStats(personCount, systemCount) {
            $('#personCount').text(personCount);
            $('#systemCount').text(systemCount);
        }
    </script>
</body>
</html>
