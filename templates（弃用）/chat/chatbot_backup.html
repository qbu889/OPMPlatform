{% extends "base.html" %}

{% block title %}智能客服系统{% endblock %}

{% block content %}
<style>
    .chatbot-page-body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .chatbot-page-body .chatbot-main-container {
        display: flex;
        height: 95vh;
        gap: 20px;
        padding: 20px;
    }

    .chatbot-page-body .chat-panel {
        flex: 2;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .chatbot-page-body .sidebar-panel {
        flex: 1;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .chatbot-page-body .chat-header {
        background: linear-gradient(to right, #4361ee, #3f37c9);
        color: white;
        padding: 20px;
        text-align: center;
    }

    .chatbot-page-body .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .chatbot-page-body .message {
        max-width: 80%;
        padding: 15px 20px;
        border-radius: 18px;
        position: relative;
        animation: fadeIn 0.3s ease-in;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .chatbot-page-body .user-message {
        align-self: flex-end;
        background: linear-gradient(to right, #4361ee, #3f37c9);
        color: white;
        border-bottom-right-radius: 5px;
    }

    .chatbot-page-body .assistant-message {
        align-self: flex-start;
        background: #f8f9fa;
        color: #212529;
        border-bottom-left-radius: 5px;
    }

    .chatbot-page-body .message-header {
        font-size: 0.8em;
        opacity: 0.8;
        margin-bottom: 5px;
        font-weight: 600;
    }

    .chatbot-page-body .message-content {
        line-height: 1.5;
        white-space: pre-wrap;
    }

    .chatbot-page-body .typing-indicator {
        align-self: flex-start;
        background: #f8f9fa;
        color: #6c757d;
        padding: 15px 20px;
        border-radius: 18px;
        display: none;
        border-bottom-left-radius: 5px;
    }

    .chatbot-page-body .typing-dots {
        display: inline-block;
    }

    .chatbot-page-body .typing-dots span {
        animation: typing 1.4s infinite ease-in-out;
        background: #6c757d;
        border-radius: 50%;
        display: inline-block;
        height: 8px;
        margin-right: 4px;
        width: 8px;
    }

    .chatbot-page-body .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .chatbot-page-body .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chatbot-page-body .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-5px); }
    }

    .chatbot-page-body .chat-input {
        padding: 20px;
        border-top: 1px solid #eee;
        background: white;
        display: flex;
        gap: 10px;
    }

    .chatbot-page-body .message-input {
        flex: 1;
        padding: 12px 20px;
        border: 2px solid #e9ecef;
        border-radius: 25px;
        outline: none;
        transition: border-color 0.3s;
    }

    .chatbot-page-body .message-input:focus {
        border-color: #4361ee;
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }

    .chatbot-page-body .send-button {
        background: linear-gradient(to right, #4361ee, #3f37c9);
        color: white;
        border: none;
        border-radius: 25px;
        padding: 12px 25px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .chatbot-page-body .send-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3);
    }

    .chatbot-page-body .send-button:disabled {
        opacity: 0.6;
        transform: none;
        cursor: not-allowed;
    }

    .chatbot-page-body .clear-button {
        background: #6c757d;
        color: white;
        border: none;
        border-radius: 25px;
        padding: 12px 20px;
        cursor: pointer;
        margin-left: 10px;
    }

    .chatbot-page-body .clear-button:hover {
        background: #5a6268;
    }

    .chatbot-page-body .timestamp {
        font-size: 0.7em;
        opacity: 0.7;
        margin-top: 5px;
        text-align: right;
    }

    /* 代码块样式 */
    .chatbot-page-body .code-block {
        background: #282c34;
        color: #abb2bf;
        padding: 15px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 10px 0;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 13px;
        line-height: 1.5;
        border-left: 4px solid #61afef;
    }

    .chatbot-page-body .inline-code {
        background: rgba(97, 175, 239, 0.1);
        color: #e06c75;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        font-size: 0.9em;
    }

    /* 操作按钮样式 */
    .chatbot-page-body .message-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        justify-content: flex-end;
    }

    .chatbot-page-body .action-btn {
        padding: 4px 12px;
        background: rgba(102, 126, 234, 0.1);
        color: #667eea;
        border: 1px solid rgba(102, 126, 234, 0.3);
        border-radius: 12px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
    }

    .chatbot-page-body .action-btn:hover {
        background: rgba(102, 126, 234, 0.2);
        border-color: #667eea;
    }

    .chatbot-page-body .action-btn.copied {
        background: rgba(56, 239, 125, 0.2);
        border-color: #38ef7d;
        color: #38ef7d;
    }

    /* Sidebar styles */
    .chatbot-page-body .sidebar-header {
        background: #f8f9fa;
        padding: 15px;
        border-bottom: 1px solid #dee2e6;
    }

    .chatbot-page-body .sidebar-content {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
    }

    .chatbot-page-body .nav-tabs {
        margin-bottom: 15px;
    }

    .chatbot-page-body .tab-pane {
        display: none;
    }

    .chatbot-page-body .tab-pane.active {
        display: block;
    }

    .chatbot-page-body .document-item, .chatbot-page-body .faq-item {
        background: #f8f9fa;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 8px;
        border-left: 4px solid #4361ee;
    }

    .chatbot-page-body .document-item:hover, .chatbot-page-body .faq-item:hover {
        background: #e9ecef;
        cursor: pointer;
    }

    .chatbot-page-body .upload-area {
        border: 2px dashed #dee2e6;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        margin-bottom: 15px;
        transition: all 0.3s;
    }

    .chatbot-page-body .upload-area:hover {
        border-color: #4361ee;
        background: rgba(67, 97, 238, 0.05);
    }

    .chatbot-page-body .upload-area.dragover {
        border-color: #4cc9f0;
        background: rgba(76, 201, 240, 0.1);
    }

    .chatbot-page-body .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.75em;
        font-weight: 600;
    }

    .chatbot-page-body .status-success {
        background: #d4edda;
        color: #155724;
    }

    .chatbot-page-body .status-error {
        background: #f8d7da;
        color: #721c24;
    }

    .chatbot-page-body .status-warning {
        background: #fff3cd;
        color: #856404;
    }

    /* 响应式设计 */
    @media (max-width: 992px) {
        .chatbot-page-body .chatbot-main-container {
            flex-direction: column;
        }
        
        .chatbot-page-body .chat-panel, .chatbot-page-body .sidebar-panel {
            flex: none;
            height: 50vh;
        }
    }
</style>

<div class="chatbot-page-body">
    <div class="chatbot-main-container">
        <div class="chat-panel">
            <div class="chat-header">
                <h3 class="mb-0"><i class="fas fa-robot me-2"></i>智能客服系统</h3>
            </div>
            <div class="chat-messages" id="chatMessages">
                <!-- 消息会动态添加到这里 -->
            </div>
            <div class="typing-indicator" id="typingIndicator">
                <span class="typing-dots">
                    <span></span><span></span><span></span>
                </span>
            </div>
            <div class="chat-input">
                <input type="text" class="message-input" id="messageInput" placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
                <button class="send-button" id="sendButton" onclick="sendMessage()">
                    <i class="fas fa-paper-plane me-1"></i>发送
                </button>
                <button class="clear-button" onclick="clearChat()">
                    <i class="fas fa-trash-alt me-1"></i>清空
                </button>
            </div>
        </div>
        
        <div class="sidebar-panel">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0"><i class="fas fa-history me-2"></i>会话历史</h5>
            </div>
            <div class="card-body p-0" style="flex: 1; overflow-y: auto;">
                <div id="historyList">
                    <!-- 历史记录会动态加载到这里 -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// ========== 全局变量 ==========
let sessionId = null;
let conversationHistory = [];

// ========== DOM 元素 ==========
const chatMessages = document.getElementById('chatMessages');
const userInput = document.getElementById('userInput');
const sendButton = document.getElementById('sendButton');
const clearButton = document.getElementById('clearButton');
const typingIndicator = document.getElementById('typingIndicator');
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const documentsList = document.getElementById('documentsList');
const faqsList = document.getElementById('faqsList');
const faqSearch = document.getElementById('faqSearch');
const searchBtn = document.getElementById('searchBtn');
const ollamaStatus = document.getElementById('ollamaStatus');

// ========== 初始化 ==========
window.addEventListener('load', () => {
    setWelcomeTime();
    loadDomainCategories();  // 加载领域列表
    loadDocuments();
    loadFaqs();
    checkOllamaStatus();
    userInput.focus();
});

function setWelcomeTime() {
    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    document.getElementById('welcomeTime').textContent = timeStr;
}

// 加载专业领域列表
async function loadDomainCategories() {
    try {
        console.log('[DEBUG] 开始加载领域列表...');
        const response = await fetch('/api/category/list');
        console.log('[DEBUG] 响应状态:', response.status);
        
        if (response.ok) {
            const data = await response.json();
            console.log('[DEBUG] API 返回数据:', data);
            
            const domainSelect = document.getElementById('domainSelect');
            
            if (data.success) {
                console.log('[DEBUG] 领域数量:', data.categories.length);
                
                // 清空选项（保留第一个提示选项）
                domainSelect.innerHTML = '<option value="">-- 请选择领域 --</option>';
                
                // 添加领域选项
                if (data.categories.length > 0) {
                    data.categories.forEach(cat => {
                        console.log('[DEBUG] 添加领域:', cat.name, 'ID:', cat.id);
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        if (cat.description) {
                            option.title = cat.description;
                        }
                        domainSelect.appendChild(option);
                    });
                    console.log('[DEBUG] 领域列表加载完成');
                } else {
                    console.warn('[DEBUG] 暂无领域数据，请先在领域管理页面添加');
                }
            } else {
                console.error('[DEBUG] API 返回失败:', data.error);
            }
        } else {
            console.error('[DEBUG] HTTP 错误:', response.status);
        }
    } catch (error) {
        console.error('[DEBUG] 加载领域列表异常:', error);
    }
}

// ========== 聊天功能 ==========
async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;
    
    addMessageToChat(message, 'user');
    userInput.value = '';
    sendButton.disabled = true;
    typingIndicator.style.display = 'none';
    scrollToBottom();
    
    try {
        const response = await fetch('/chatbot/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: message,
                session_id: sessionId
            })
        });
        
        typingIndicator.style.display = 'none';
        
        if (response.ok) {
            const data = await response.json();
            const aiResponse = data.answer;
            
            addMessageToChat(aiResponse, 'assistant');
            sessionId = data.session_id;
            
            // 如果有检索到的 FAQ，显示来源
            if (data.retrieved_faqs && data.retrieved_faqs.length > 0) {
                showRetrievedFaqs(data.retrieved_faqs);
            }
        } else {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
    } catch (error) {
        typingIndicator.style.display = 'none';
        addMessageToChat(`抱歉，处理您的请求时出现错误：${error.message}`, 'assistant');
        console.error('Error:', error);
    } finally {
        sendButton.disabled = false;
        userInput.focus();
    }
}

function addMessageToChat(content, role) {
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message');
    messageDiv.classList.add(role + '-message');
    
    const header = document.createElement('div');
    header.classList.add('message-header');
    
    if (role === 'user') {
        header.innerHTML = '<i class="fas fa-user me-1"></i>您';
    } else {
        header.innerHTML = '<i class="fas fa-robot me-1"></i>AI 助手';
    }
    
    const contentDiv = document.createElement('div');
    contentDiv.classList.add('message-content');
    
    // 处理内容：支持 Markdown 格式（包括图片）
    let formattedContent = content
        // 1. 图片：![描述](URL)
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width: 100%; border-radius: 8px; margin: 8px 0;">')
        // 2. 代码块
        .replace(/```([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>')
        // 3. 行内代码
        .replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>')
        // 4. 链接
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-decoration-none">$1</a>')
        // 5. 粗体
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        // 6. 换行
        .replace(/\n/g, '<br>');
    
    contentDiv.innerHTML = formattedContent;
    
    const timestamp = document.createElement('div');
    timestamp.classList.add('timestamp');
    const now = new Date();
    timestamp.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    
    messageDiv.appendChild(header);
    messageDiv.appendChild(contentDiv);
    
    // 为 AI 回复添加复制按钮
    if (role === 'assistant') {
        const actionDiv = document.createElement('div');
        actionDiv.style.cssText = 'display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end;';
        
        // 复制按钮
        const copyBtn = document.createElement('button');
        copyBtn.innerHTML = '<i class="fas fa-copy me-1"></i>复制';
        copyBtn.style.cssText = `
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        `;
        copyBtn.onmouseover = () => {
            copyBtn.style.background = 'rgba(102, 126, 234, 0.2)';
            copyBtn.style.borderColor = '#667eea';
        };
        copyBtn.onmouseout = () => {
            copyBtn.style.background = 'rgba(102, 126, 234, 0.1)';
            copyBtn.style.borderColor = 'rgba(102, 126, 234, 0.3)';
        };
        copyBtn.onclick = () => {
            // 复制纯文本内容（去除 HTML 标签）
            const textToCopy = content;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check me-1"></i>已复制';
                copyBtn.style.background = 'rgba(56, 239, 125, 0.2)';
                copyBtn.style.borderColor = '#38ef7d';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.style.background = 'rgba(102, 126, 234, 0.1)';
                    copyBtn.style.borderColor = 'rgba(102, 126, 234, 0.3)';
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                copyBtn.innerHTML = '<i class="fas fa-times me-1"></i>失败';
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy me-1"></i>复制';
                }, 2000);
            });
        };
        
        actionDiv.appendChild(copyBtn);
        messageDiv.appendChild(actionDiv);
    }
    
    messageDiv.appendChild(timestamp);
    chatMessages.appendChild(messageDiv);
    scrollToBottom();
}

function scrollToBottom() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function clearChat() {
    if (confirm('确定要清空所有聊天记录吗？')) {
        if (sessionId) {
            fetch('/chatbot/conversation/clear', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ session_id: sessionId })
            }).catch(err => console.error('清空对话失败:', err));
        }
        
        chatMessages.innerHTML = '';
        conversationHistory = [];
        sessionId = null;
        
        const welcomeMessage = document.createElement('div');
        welcomeMessage.classList.add('message', 'assistant-message');
        welcomeMessage.innerHTML = `
            <div class="message-header">
                <i class="fas fa-robot me-1"></i>AI 助手
            </div>
            <div class="message-content">聊天记录已清空。您好！我是您的智能客服助手，随时准备为您提供帮助。</div>
            <div class="timestamp">${new Date().getHours().toString().padStart(2, '0')}:${new Date().getMinutes().toString().padStart(2, '0')}</div>
        `;
        chatMessages.appendChild(welcomeMessage);
    }
}

// ========== 文档上传功能 ==========
uploadArea.addEventListener('click', () => {
    fileInput.click();
});

fileInput.addEventListener('change', handleFileSelect);

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        uploadDocument(files[0]);
    }
});

function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) {
        uploadDocument(file);
    }
}

async function uploadDocument(file) {
    // 验证是否选择了领域
    const domainSelect = document.getElementById('domainSelect');
    const domainId = domainSelect.value;
    
    if (!domainId) {
        alert('请先选择专业领域！\n\n如果没有可用的领域，请点击"领域管理"按钮添加专业领域。');
        return;
    }
    
    const formData = new FormData();
    formData.append('file', file);
    formData.append('domain_id', domainId);
    
    const originalContent = uploadArea.innerHTML;
    uploadArea.innerHTML = '<i class="fas fa-spinner fa-spin fa-2x"></i><p>正在提取 FAQ，请稍候...</p>';
    
    try {
        // 第一步：调用预览接口
        const response = await fetch('/chatbot/upload_document/preview', {
            method: 'POST',
            body: formData
        });
        
        if (response.ok) {
            const data = await response.json();
            
            console.log('[DEBUG] 上传成功，返回数据:', data);
            console.log('[DEBUG] FAQ 数量:', data.faqs_preview ? data.faqs_preview.length : 0);
            
            // 将预览数据存储到 localStorage（持久化，刷新后还在）
            const previewId = data.preview_id;
            
            // 检查 faqs_preview 是否存在且有数据
            if (data.faqs_preview && data.faqs_preview.length > 0) {
                localStorage.setItem('faqPreviewData', JSON.stringify(data.faqs_preview));
                localStorage.setItem('faqPreviewId', previewId);
                
                // 同时兼容旧版本（sessionStorage）
                sessionStorage.setItem('faqPreview_' + previewId, JSON.stringify(data.faqs_preview));
                
                console.log('[DEBUG] 预览数据已存储到 localStorage:', previewId);
                console.log('[DEBUG] 存储的 FAQ 数量:', data.faqs_preview.length);
                
                // 跳转到预览页面
                window.location.href = `/chatbot/faq_preview?preview_id=${previewId}`;
            } else {
                console.error('[DEBUG] faqs_preview 为空或不存在!');
                throw new Error('未提取到 FAQ 数据');
            }
        } else {
            const errorData = await response.json();
            throw new Error(errorData.error || '上传失败');
        }
    } catch (error) {
        alert(`上传失败：${error.message}`);
        console.error('Upload error:', error);
    } finally {
        uploadArea.innerHTML = originalContent;
        fileInput.value = '';
    }
}

async function loadDocuments() {
    try {
        const response = await fetch('/chatbot/documents');
        if (response.ok) {
            const data = await response.json();
            displayDocuments(data.documents);
        }
    } catch (error) {
        console.error('加载文档失败:', error);
    }
}

function displayDocuments(documents) {
    if (!documents || documents.length === 0) {
        documentsList.innerHTML = '<p class="text-muted">暂无文档</p>';
        return;
    }
    
    documentsList.innerHTML = documents.map(doc => {
        // 根据状态显示不同图标
        let statusIcon = '';
        let statusText = '';
        
        if (doc.metadata && doc.metadata.faq_status) {
            if (doc.metadata.faq_status === 'processing') {
                statusIcon = '<i class="fas fa-spinner fa-spin text-warning"></i>';
                statusText = '处理中';
            } else if (doc.metadata.faq_status === 'completed') {
                statusIcon = '<i class="fas fa-check-circle text-success"></i>';
                statusText = `已完成 (${doc.metadata.faq_count || 0}条)`;
            } else if (doc.metadata.faq_status === 'failed') {
                statusIcon = '<i class="fas fa-times-circle text-danger"></i>';
                statusText = '失败';
            }
        }
        
        return `
        <div class="document-item">
            <div>
                <i class="fas fa-file me-2"></i>${doc.original_filename || doc.filename}
                ${statusIcon ? `<span class="ms-2" title="${statusText}">${statusIcon}</span>` : ''}
            </div>
            <small class="text-muted">类型：${doc.file_type} | 上传时间：${new Date(doc.upload_time).toLocaleString()}</small>
            ${statusText ? `<small class="text-muted d-block">FAQ: ${statusText}</small>` : ''}
        </div>
    `}).join('');
}

// ========== FAQ 功能 ==========
async function loadFaqs() {
    try {
        const response = await fetch('/chatbot/faqs');
        if (response.ok) {
            const data = await response.json();
            displayFaqs(data.faqs);
        }
    } catch (error) {
        console.error('加载 FAQ 失败:', error);
    }
}

function displayFaqs(faqs) {
    if (!faqs || faqs.length === 0) {
        faqsList.innerHTML = '<p class="text-muted">暂无 FAQ</p>';
        return;
    }
    
    faqsList.innerHTML = faqs.map(faq => `
        <div class="faq-item" onclick="useFaq('${faq.question}')">
            <div><strong>问：${faq.question}</strong></div>
            <div class="mt-2"><small>答：${faq.answer.substring(0, 100)}${faq.answer.length > 100 ? '...' : ''}</small></div>
            <small class="text-muted mt-1 d-block">浏览：${faq.view_count}次</small>
        </div>
    `).join('');
}

function useFaq(question) {
    userInput.value = question;
    userInput.focus();
}

// 显示检索到的 FAQ
function showRetrievedFaqs(faqs) {
    if (!faqs || faqs.length === 0) return;
    
    // 创建 FAQ 容器 - 作为 AI 消息的一部分
    const faqContainer = document.createElement('div');
    faqContainer.classList.add('message', 'assistant-message');
    faqContainer.style.cssText = `
        margin: 10px 20px;
        max-width: 80%;
    `;
    
    // 头部
    const header = document.createElement('div');
    header.classList.add('message-header');
    header.innerHTML = '<i class="fas fa-book me-2"></i>AI 助手';
    faqContainer.appendChild(header);
    
    // 内容区域
    const contentDiv = document.createElement('div');
    contentDiv.classList.add('message-content');
    contentDiv.style.cssText = `
        padding: 8px 10px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 10px;
        color: white;
    `;
    
    // 标题
    const title = document.createElement('div');
    title.innerHTML = `<strong><i class="fas fa-star me-2"></i>相关 FAQ (${faqs.length}条)</strong>`;
    title.style.cssText = 'margin-bottom: 4px; font-size: 12px;';
    contentDiv.appendChild(title);
    
    // FAQ 列表 - 增加最大高度，减少滚动
    const faqList = document.createElement('div');
    faqList.style.cssText = 'max-height: 320px; overflow-y: auto;';
    
    const displayCount = Math.min(faqs.length, 5);
    for (let i = 0; i < displayCount; i++) {
        const faq = faqs[i];
        const faqItem = document.createElement('div');
        faqItem.style.cssText = `
            padding: 3px 8px;
            margin: 1px 0;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 2px solid transparent;
            color: #333;
            line-height: 1.2;
        `;
        faqItem.onmouseover = () => {
            faqItem.style.background = 'rgba(255, 255, 255, 1)';
            faqItem.style.borderColor = '#ffd700';
            faqItem.style.transform = 'translateX(5px)';
        };
        faqItem.onmouseout = () => {
            faqItem.style.background = 'rgba(255, 255, 255, 0.95)';
            faqItem.style.borderColor = 'transparent';
            faqItem.style.transform = 'translateX(0)';
        };
        
        faqItem.innerHTML = `
            <div style="color: #667eea; font-weight: 600; margin-bottom: 0px; font-size: 11px; line-height: 1.2;">
                <i class="fas fa-question-circle me-1"></i>${faq.question}
            </div>
            <div style="display: flex; gap: 6px; font-size: 9px; color: #666; align-items: center; line-height: 1; margin-top: 2px;">
                <span><i class="fas fa-eye me-1"></i>${faq.view_count || 0}</span>
                ${faq.similarity_score ? `<span><i class="fas fa-chart-line me-1"></i>${(faq.similarity_score * 100).toFixed(0)}%</span>` : ''}
            </div>
        `;
        
        // 点击显示详情
        faqItem.onclick = () => {
            showFaqDetail(faq);
        };
        
        faqList.appendChild(faqItem);
    }
    
    contentDiv.appendChild(faqList);
    
    // 如果超过 5 条，显示"查看更多"按钮
    if (faqs.length > 5) {
        const moreBtn = document.createElement('button');
        moreBtn.innerHTML = `<i class="fas fa-ellipsis-h me-2"></i>查看全部 ${faqs.length} 条`;
        moreBtn.style.cssText = `
            margin-top: 10px;
            padding: 6px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            font-size: 12px;
            transition: all 0.3s;
        `;
        moreBtn.onmouseover = () => moreBtn.style.background = 'rgba(255, 255, 255, 0.3)';
        moreBtn.onmouseout = () => moreBtn.style.background = 'rgba(255, 255, 255, 0.2)';
        moreBtn.onclick = () => {
            const faqTab = document.getElementById('faqTab');
            if (faqTab) {
                faqTab.click();
                displayFaqs(faqs);
            }
        };
        contentDiv.appendChild(moreBtn);
    }
    
    faqContainer.appendChild(contentDiv);
    
    // 时间戳
    const timestamp = document.createElement('div');
    timestamp.classList.add('timestamp');
    const now = new Date();
    timestamp.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    timestamp.style.cssText = 'text-align: right; margin-top: 5px;';
    faqContainer.appendChild(timestamp);
    
    chatMessages.appendChild(faqContainer);
    scrollToBottom();
}

// 显示 FAQ 详情
function showFaqDetail(faq) {
    const detailContainer = document.createElement('div');
    detailContainer.classList.add('message', 'assistant-message');
    detailContainer.style.cssText = `
        margin: 10px 20px;
        max-width: 80%;
    `;
    
    // 头部
    const header = document.createElement('div');
    header.classList.add('message-header');
    header.innerHTML = '<i class="fas fa-info-circle me-2"></i>AI 助手';
    detailContainer.appendChild(header);
    
    // 内容区域
    const contentDiv = document.createElement('div');
    contentDiv.classList.add('message-content');
    contentDiv.style.cssText = `
        padding: 12px;
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        border-radius: 12px;
        color: white;
    `;
    
    // 处理答案内容：支持图片、代码块、换行等
    let processedAnswer = faq.answer
        // 处理图片 markdown 格式 ![alt](url)
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width: 100%; border-radius: 8px; margin: 10px 0; border: 2px solid rgba(255,255,255,0.3);">')
        // 处理代码块
        .replace(/```([\s\S]*?)```/g, '<pre style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; overflow-x: auto; font-size: 12px;"><code>$1</code></pre>')
        // 处理行内代码
        .replace(/`([^`]+)`/g, '<code style="background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 3px; font-size: 12px;">$1</code>')
        // 处理换行
        .replace(/\n/g, '<br>');
    
    contentDiv.innerHTML = `
        <div style="margin-bottom: 10px;">
            <div style="background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 6px; margin-bottom: 8px; color: #333;">
                <div style="color: #11998e; font-weight: 600; margin-bottom: 6px; font-size: 13px;">
                    <i class="fas fa-question-circle me-2"></i>${faq.question}
                </div>
                <div style="line-height: 1.5; font-size: 12px;">
                    <i class="fas fa-comment-dots me-2"></i>${processedAnswer}
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 10px;">
            <div>
                <span style="margin-right: 10px;"><i class="fas fa-eye me-1"></i>${faq.view_count || 0}</span>
                ${faq.similarity_score ? `<span><i class="fas fa-chart-line me-1"></i>${(faq.similarity_score * 100).toFixed(0)}%</span>` : ''}
            </div>
            <button onclick="this.parentElement.parentElement.parentElement.parentElement.remove()" style="padding: 3px 10px; background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 10px; cursor: pointer; font-size: 10px; transition: all 0.3s;">
                <i class="fas fa-times me-1"></i>关闭
            </button>
        </div>
    `;
    
    detailContainer.appendChild(contentDiv);
    
    // 时间戳
    const timestamp = document.createElement('div');
    timestamp.classList.add('timestamp');
    const now = new Date();
    timestamp.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    timestamp.style.cssText = 'text-align: right; margin-top: 5px;';
    detailContainer.appendChild(timestamp);
    
    chatMessages.appendChild(detailContainer);
    scrollToBottom();
}

searchBtn.addEventListener('click', async () => {
    const keyword = faqSearch.value.trim();
    if (!keyword) {
        loadFaqs();
        return;
    }
    
    try {
        const response = await fetch(`/chatbot/search?keyword=${encodeURIComponent(keyword)}`);
        if (response.ok) {
            const data = await response.json();
            displayFaqs(data.faqs);
        }
    } catch (error) {
        console.error('搜索失败:', error);
    }
});

// ========== 系统状态 ==========
async function checkOllamaStatus() {
    try {
        const response = await fetch('/chatbot/ollama/status');
        if (response.ok) {
            const data = await response.json();
            displayOllamaStatus(data);
        }
    } catch (error) {
        ollamaStatus.innerHTML = '<div class="status-badge status-error">无法连接</div>';
    }
}

function displayOllamaStatus(status) {
    if (status.available) {
        ollamaStatus.innerHTML = `
            <div class="status-badge status-success">
                <i class="fas fa-check-circle me-1"></i>Ollama 服务正常
            </div>
            <div class="mt-2">
                <small>端点：${status.endpoint}</small><br>
                <small>模型：${status.models.join(', ') || '无'}</small>
            </div>
        `;
    } else {
        ollamaStatus.innerHTML = `
            <div class="status-badge status-error">
                <i class="fas fa-exclamation-circle me-1"></i>Ollama 服务不可用
            </div>
            <small class="text-muted">请确保 Ollama 服务已启动</small>
        `;
    }
}

// ========== 事件监听器 ==========
sendButton.addEventListener('click', sendMessage);

userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

clearButton.addEventListener('click', clearChat);

</script>
