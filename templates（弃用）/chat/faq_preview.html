<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ 导入预览</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: bold;
        }
        .faq-item {
            border-left: 4px solid #1890ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .faq-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .faq-item.duplicate {
            opacity: 0.6;
            background-color: #fff3cd;
        }
        .faq-item.selected {
            border-left-color: #52c41a;
            background-color: #f6ffed;
        }
        .badge-duplicate {
            background-color: #faad14;
        }
        .stats-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .stats-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #1890ff;
        }
        .action-bar {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .answer-preview {
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="text-center text-white">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
            <span>正在提取 FAQ，请稍候...</span>
        </div>
    </div>

    <div class="container">
        <!-- 统计信息 -->
        <div class="row mb-3">
            <div class="col-md-3">
                <div class="stats-card">
                    <div class="stats-number" id="totalCount">0</div>
                    <div class="text-muted">总问题数</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card">
                    <div class="stats-number" id="selectedCount">0</div>
                    <div class="text-muted">已选择</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card">
                    <div class="stats-number" id="duplicateCount">0</div>
                    <div class="text-muted">重复问题</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card">
                    <div class="stats-number" id="willImportCount">0</div>
                    <div class="text-muted">将导入</div>
                </div>
            </div>
        </div>

        <!-- 操作提示 -->
        <div class="card">
            <div class="card-body">
                <div class="alert alert-info mb-0">
                    <i class="fas fa-info-circle me-2"></i>
                    <strong>操作说明：</strong>
                    <ul class="mb-0 mt-2">
                        <li>点击问题卡片可查看详情并选中/取消选中</li>
                        <li>黄色标记的是重复问题，建议取消选择</li>
                        <li>点击底部"确认导入"按钮完成导入</li>
                        <li>可使用快捷按钮：<button class="btn btn-sm btn-outline-primary me-2" onclick="selectAll()">全选</button><button class="btn btn-sm btn-outline-warning me-2" onclick="selectNonDuplicates()">仅选非重复</button><button class="btn btn-sm btn-outline-secondary" onclick="deselectAll()">取消全选</button></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- FAQ 列表 -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="fas fa-list me-2"></i>FAQ 预览列表</span>
                <span class="badge bg-light text-dark" id="filenameDisplay"></span>
            </div>
            <div class="card-body" id="faqList">
                <!-- FAQ 列表将通过 JS 动态加载 -->
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="action-bar">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="text-muted">已选择 <strong id="selectedText" class="text-primary">0</strong> 个问题</span>
                </div>
                <div>
                    <button class="btn btn-secondary me-2" onclick="window.location.href='/chatbot'">
                        <i class="fas fa-times me-1"></i>取消
                    </button>
                    <button class="btn btn-success" id="importBtn" onclick="confirmImport()" disabled>
                        <i class="fas fa-check me-1"></i>确认导入 (<span id="importBtnCount">0</span>)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- FAQ 详情模态框 -->
    <div class="modal fade" id="faqModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">问题详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h6 class="fw-bold mb-3">
                        <span class="badge bg-primary me-2" id="modalIndex"></span>
                        <span id="modalQuestion"></span>
                    </h6>
                    <div class="mb-3">
                        <strong>答案：</strong>
                        <div id="modalAnswer" class="answer-preview"></div>
                    </div>
                    <div id="modalDuplicateAlert" class="alert alert-warning" style="display: none;">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        这是一个重复问题，建议不要导入
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        let previewId = null;
        let faqsData = [];
        let selectedIndices = new Set();

        // 从 URL 获取 preview_id
        function getPreviewIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('preview_id');
        }

        // 加载预览数据
        function loadPreview() {
            previewId = getPreviewIdFromURL();
            
            if (!previewId) {
                Swal.fire({
                    icon: 'error',
                    title: '错误',
                    text: '缺少预览 ID，请重新上传文档'
                }).then(() => {
                    window.location.href = '/chatbot';
                });
                return;
            }

            // 这里需要从后端获取数据，简化处理直接从 sessionStorage 读取
            const data = sessionStorage.getItem('faqPreview_' + previewId);
            if (data) {
                faqsData = JSON.parse(data);
                renderFAQList();
                updateStats();
            } else {
                Swal.fire({
                    icon: 'error',
                    title: '错误',
                    text: '预览数据不存在或已过期'
                }).then(() => {
                    window.location.href = '/chatbot';
                });
            }
        }

        // 渲染 FAQ 列表
        function renderFAQList() {
            const container = document.getElementById('faqList');
            container.innerHTML = '';

            faqsData.forEach((faq, index) => {
                const card = document.createElement('div');
                card.className = `card faq-item mb-2 ${faq.is_duplicate ? 'duplicate' : ''} ${selectedIndices.has(faq.index) ? 'selected' : ''}`;
                card.onclick = () => toggleSelect(faq.index);
                
                card.innerHTML = `
                    <div class="card-body py-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-center mb-2">
                                    <span class="badge bg-primary me-2">${faq.index}</span>
                                    <h6 class="mb-0 fw-bold">${faq.question}</h6>
                                </div>
                                ${faq.is_duplicate ? '<span class="badge badge-duplicate"><i class="fas fa-exclamation-triangle me-1"></i>重复问题</span>' : ''}
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" 
                                       ${selectedIndices.has(faq.index) ? 'checked' : ''} 
                                       onclick="event.stopPropagation(); toggleSelect(${faq.index})">
                            </div>
                        </div>
                        <div class="answer-preview" onclick="showDetail(${index})">
                            <small class="text-muted"><i class="fas fa-eye me-1"></i>点击查看完整答案</small>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // 切换选择状态
        function toggleSelect(index) {
            if (selectedIndices.has(index)) {
                selectedIndices.delete(index);
            } else {
                selectedIndices.add(index);
            }
            renderFAQList();
            updateStats();
        }

        // 更新统计信息
        function updateStats() {
            const total = faqsData.length;
            const selected = selectedIndices.size;
            const duplicates = faqsData.filter(f => f.is_duplicate).length;
            const willImport = selected;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('selectedCount').textContent = selected;
            document.getElementById('duplicateCount').textContent = duplicates;
            document.getElementById('willImportCount').textContent = willImport;
            document.getElementById('selectedText').textContent = selected;
            document.getElementById('importBtnCount').textContent = selected;

            // 启用/禁用导入按钮
            document.getElementById('importBtn').disabled = selected === 0;
        }

        // 全选
        function selectAll() {
            faqsData.forEach(faq => selectedIndices.add(faq.index));
            renderFAQList();
            updateStats();
        }

        // 仅选非重复
        function selectNonDuplicates() {
            selectedIndices.clear();
            faqsData.filter(f => !f.is_duplicate).forEach(faq => selectedIndices.add(faq.index));
            renderFAQList();
            updateStats();
        }

        // 取消全选
        function deselectAll() {
            selectedIndices.clear();
            renderFAQList();
            updateStats();
        }

        // 显示详情
        function showDetail(index) {
            const faq = faqsData[index];
            document.getElementById('modalIndex').textContent = `第${faq.index}题`;
            document.getElementById('modalQuestion').textContent = faq.question;
            
            // 将 Markdown 转换为 HTML
            const answerHtml = markdownToHtml(faq.answer);
            document.getElementById('modalAnswer').innerHTML = answerHtml;
            
            document.getElementById('modalDuplicateAlert').style.display = faq.is_duplicate ? 'block' : 'none';
            
            const modal = new bootstrap.Modal(document.getElementById('faqModal'));
            modal.show();
        }
        
        // Markdown 转 HTML 工具函数
        function markdownToHtml(markdown) {
            if (!markdown) return '';
            
            let html = markdown;
            
            // 1. 图片：![描述](URL) -> <img src="URL" alt="描述">
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" class="img-fluid rounded my-2" style="max-width: 100%;">');
            
            // 2. 链接：[文本](URL) -> <a href="URL">文本</a>
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" class="text-decoration-none">$1</a>');
            
            // 3. 代码块：```code``` -> <pre><code>code</code></pre>
            html = html.replace(/```([\s\S]*?)```/g, '<pre class="bg-light p-3 rounded"><code>$1</code></pre>');
            
            // 4. 行内代码：`code` -> <code>code</code>
            html = html.replace(/`([^`]+)`/g, '<code class="bg-light px-2 py-1 rounded">$1</code>');
            
            // 5. 粗体：**text** -> <strong>text</strong>
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // 6. 斜体：*text* -> <em>text</em>
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // 7. 列表：- item -> <li>item</li>
            html = html.replace(/^\s*[-*+]\s+(.*)$/gm, '<li class="ms-3">$1</li>');
            
            // 8. 有序列表：1. item -> <li>item</li>
            html = html.replace(/^\s*\d+\.\s+(.*)$/gm, '<li class="ms-3">$1</li>');
            
            // 9. 换行：\n -> <br>
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }

        // 确认导入
        function confirmImport() {
            if (selectedIndices.size === 0) {
                Swal.fire('提示', '请至少选择一个问题', 'info');
                return;
            }

            Swal.fire({
                title: '确认导入',
                text: `确定要导入 ${selectedIndices.size} 个问题吗？`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: '确定',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    importFAQs();
                }
            });
        }

        // 执行导入
        function importFAQs() {
            fetch('/chatbot/upload_document/confirm', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    preview_id: previewId,
                    selected_indices: Array.from(selectedIndices)
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: '导入成功',
                        text: `成功导入 ${data.imported_count} 条 FAQ`,
                        confirmButtonText: '确定'
                    }).then(() => {
                        window.location.href = '/chatbot';
                    });
                } else {
                    Swal.fire('错误', data.error || '导入失败', 'error');
                }
            })
            .catch(error => {
                console.error('导入失败:', error);
                Swal.fire('错误', '导入失败：' + error, 'error');
            });
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[DEBUG] 页面开始加载...');
            
            // 1. 首先尝试从 localStorage 获取数据（持久化存储，刷新后还在）
            const tempData = localStorage.getItem('faqPreviewData');
            const previewIdFromStorage = localStorage.getItem('faqPreviewId');
            
            if (tempData && previewIdFromStorage) {
                faqsData = JSON.parse(tempData);
                previewId = previewIdFromStorage;
                
                console.log('[DEBUG] 从 localStorage 恢复预览数据:', previewId);
                console.log('[DEBUG] FAQ 数量:', faqsData.length);
                
                renderFAQList();
                updateStats();
            } else {
                console.log('[DEBUG] localStorage 中没有数据，尝试从 URL 获取...');
                
                // 2. 如果 localStorage 没有，尝试从 URL 参数获取 preview_id
                const urlParams = new URLSearchParams(window.location.search);
                const urlPreviewId = urlParams.get('preview_id');
                
                console.log('[DEBUG] URL preview_id:', urlPreviewId);
                
                if (urlPreviewId) {
                    if (urlPreviewId.startsWith('temp_')) {
                        // 从 sessionStorage 获取（兼容旧版本）
                        const sessionData = sessionStorage.getItem('faqPreview_' + urlPreviewId);
                        if (sessionData) {
                            faqsData = JSON.parse(sessionData);
                            previewId = urlPreviewId;
                            
                            // 迁移到 localStorage
                            localStorage.setItem('faqPreviewData', sessionData);
                            localStorage.setItem('faqPreviewId', urlPreviewId);
                            
                            console.log('[DEBUG] 从 sessionStorage 迁移到 localStorage');
                            
                            renderFAQList();
                            updateStats();
                        } else {
                            console.log('[DEBUG] sessionStorage 中也没有数据，需要重新上传');
                            showReloadError();
                        }
                    } else {
                        // 新的 preview_id 格式，应该从数据库获取
                        console.log('[DEBUG] 检测到数据库 preview_id，但需要实现 API 获取');
                        showReloadError();
                    }
                } else {
                    console.log('[DEBUG] URL 中没有 preview_id 参数');
                    showReloadError();
                }
            }
        });
        
        // 显示重新加载错误提示
        function showReloadError() {
            Swal.fire({
                icon: 'warning',
                title: '数据已过期',
                html: '<p>预览数据已丢失，请重新上传文档</p>' +
                      '<p class="text-muted mt-2">可能的原因：</p>' +
                      '<ul class="text-left mt-1">' +
                      '<li>页面刷新次数过多</li>' +
                      '<li>浏览器缓存被清除</li>' +
                      '<li>预览数据已过期（24 小时）</li></ul>',
                confirmButtonText: '重新上传',
                showCancelButton: true,
                cancelButtonText: '返回主页'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/chatbot';
                } else {
                    window.location.href = '/chatbot';
                }
            });
        }
    </script>
</body>
</html>
