{% extends "base.html" %}

{% block title %}在线表格 - 列表{% endblock %}

{% block content %}
<style>
    .spreadsheet-page-body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
    }
    
    .spreadsheet-page-body * {
        box-sizing: border-box;
    }
    
    .spreadsheet-page-body .header {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        margin-bottom: 30px;
    }
    
    .spreadsheet-page-body h1 {
        color: #333;
        font-size: 32px;
        margin-bottom: 10px;
    }
    
    .spreadsheet-page-body .subtitle {
        color: #666;
        font-size: 16px;
    }
    
    .spreadsheet-page-body .create-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 20px;
    }
    
    .spreadsheet-page-body .create-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .spreadsheet-page-body .spreadsheet-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
    }
    
    .spreadsheet-page-body .spreadsheet-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        transition: transform 0.2s;
        cursor: pointer;
    }
    
    .spreadsheet-page-body .spreadsheet-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    
    .spreadsheet-page-body .spreadsheet-name {
        font-size: 20px;
        font-weight: bold;
        color: #333;
        margin-bottom: 10px;
    }
    
    .spreadsheet-page-body .spreadsheet-desc {
        color: #666;
        font-size: 14px;
        margin-bottom: 15px;
        line-height: 1.5;
    }
    
    .spreadsheet-page-body .spreadsheet-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 15px;
        border-top: 1px solid #eee;
    }
    
    .spreadsheet-page-body .meta-item {
        font-size: 13px;
        color: #999;
    }
    
    .spreadsheet-page-body .delete-btn {
        background: #ff4444;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.2s;
    }
    
    .spreadsheet-page-body .delete-btn:hover {
        background: #cc0000;
    }
    
    .spreadsheet-page-body .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: white;
        border-radius: 15px;
    }
    
    .spreadsheet-page-body .empty-state p {
        color: #999;
        font-size: 18px;
        margin-top: 20px;
    }
    
    .spreadsheet-page-body .loading {
        text-align: center;
        padding: 40px;
        color: white;
        font-size: 18px;
    }
</style>

<div class="spreadsheet-page-body">
    <div class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">在线表格 - 列表</h3>
            </div>
            <div class="card-body">
                <div class="header">
                    <h1>📊 在线表格</h1>
                    <p class="subtitle">创建和管理您的电子表格</p>
                    <button class="create-btn" onclick="createSpreadsheet()">+ 创建新表格</button>
                </div>
                
                <div id="spreadsheetGrid" class="spreadsheet-grid">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 加载表格列表
        async function loadSpreadsheets() {
            try {
                const response = await fetch('/spreadsheet/api/list');
                const result = await response.json();
                
                const grid = document.getElementById('spreadsheetGrid');
                
                if (result.success && result.data.length > 0) {
                    grid.innerHTML = result.data.map(item => `
                        <div class="spreadsheet-card" onclick="openSpreadsheet(${item.id})">
                            <div class="spreadsheet-name">${item.name}</div>
                            <div class="spreadsheet-desc">${item.description || '暂无描述'}</div>
                            <div class="spreadsheet-meta">
                                <span class="meta-item">${item.row_count} 行 × ${item.col_count} 列</span>
                                <button class="delete-btn" onclick="event.stopPropagation(); deleteSpreadsheet(${item.id})">删除</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div style="font-size: 64px; margin-bottom: 20px;">📝</div>
                            <p>还没有创建任何表格</p>
                            <p>点击上方按钮创建您的第一个表格</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('spreadsheetGrid').innerHTML = 
                    '<div class="empty-state"><p>加载失败，请刷新页面重试</p></div>';
            }
        }
        
        // 创建表格
        async function createSpreadsheet() {
            const name = prompt('请输入表格名称:', '未命名表格');
            if (!name) return;
            
            const description = prompt('请输入表格描述（可选）:', '');
            
            try {
                const response = await fetch('/spreadsheet/api/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        description: description || '',
                        columns: [
                            { name: '序号', type: 'number', width: 80 },
                            { name: '项目名称', type: 'text', width: 200 },
                            { name: '负责人', type: 'text', width: 120 },
                            { name: '状态', type: 'select', width: 100, options: ['待处理', '进行中', '已完成'] },
                            { name: '优先级', type: 'select', width: 100, options: ['高', '中', '低'] },
                            { name: '备注', type: 'text', width: 300 }
                        ]
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('表格创建成功！');
                    loadSpreadsheets();
                } else {
                    alert('创建失败：' + result.message);
                }
            } catch (error) {
                alert('创建失败：' + error.message);
            }
        }
        
        // 打开表格
        function openSpreadsheet(id) {
            window.location.href = `/spreadsheet/${id}`;
        }
        
        // 删除表格
        async function deleteSpreadsheet(id) {
            if (!confirm('确定要删除这个表格吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`/spreadsheet/api/${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('删除成功');
                    loadSpreadsheets();
                } else {
                    alert('删除失败：' + result.message);
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
        
        // 页面加载时获取列表
        loadSpreadsheets();
    </script>
</div>
{% endblock %}
